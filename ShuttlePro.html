<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ShuttlePro — Badminton Tournament Organizer</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;900&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
/* ─── RESET & VARIABLES ─────────────────────────────────── */
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1a1f2e;--surface:#242938;--surface2:#2d3347;--surface3:#363d56;
  --accent:#f0c040;--accent2:#3dd68c;--accent3:#5b9cf6;--danger:#f05555;--warn:#f08040;
  --text:#e8eaf0;--text2:#9ba3c2;--text3:#5f6882;
  --border:#3a4260;--border2:#4a5580;
  --r:12px;--rs:8px;
}
body{font-family:'Barlow',sans-serif;background:var(--primary);color:var(--text);min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Barlow Condensed',sans-serif;letter-spacing:.02em}
button,input,select,textarea{font-family:'Barlow',sans-serif}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* ─── LAYOUT ────────────────────────────────────────────── */
#app{min-height:100vh;display:flex;flex-direction:column}
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 20px;display:flex;align-items:center;gap:10px;height:54px;flex-shrink:0;position:sticky;top:0;z-index:200}
.nav-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:21px;color:var(--accent);letter-spacing:.06em;flex:1}
.nav-logo span{color:var(--text);font-weight:400}
.nav-tab{background:none;border:none;color:var(--text2);font-size:11px;font-weight:700;padding:5px 12px;border-radius:20px;transition:all .2s;text-transform:uppercase;letter-spacing:.06em;cursor:pointer;white-space:nowrap}
.nav-tab.active{background:var(--accent);color:var(--primary)}
.nav-tab:hover:not(.active){background:var(--surface2);color:var(--text)}
.nav-user{font-size:11px;color:var(--text3);padding:4px 10px;background:var(--surface2);border-radius:20px;white-space:nowrap}
.logout-btn{background:none;border:1px solid var(--border);color:var(--text2);font-size:11px;padding:4px 10px;border-radius:20px;cursor:pointer;transition:all .2s}
.logout-btn:hover{border-color:var(--danger);color:var(--danger)}

/* ─── SHEETS STATUS BAR ──────────────────────────────────── */
.sbar{background:#1d2235;border-bottom:1px solid var(--border);padding:5px 20px;display:flex;align-items:center;gap:10px;font-size:11px;flex-wrap:wrap}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .3s}
.sdot.ok{background:var(--accent2)}
.sdot.err{background:var(--danger)}
.sdot.wait{background:var(--accent);animation:pulse 1s infinite}
.sdot.off{background:var(--text3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sbar-url{flex:1;min-width:0}
.sbar-url input{background:var(--surface2);border:1px solid var(--border);color:var(--text2);border-radius:6px;padding:3px 10px;font-size:11px;width:100%;max-width:420px;outline:none}
.sbar-url input:focus{border-color:var(--accent3)}
.sbar-btn{background:none;border:1px solid var(--border2);color:var(--text2);font-size:11px;padding:3px 10px;border-radius:6px;cursor:pointer;transition:all .2s}
.sbar-btn:hover{border-color:var(--accent);color:var(--accent)}

/* ─── MAIN ───────────────────────────────────────────────── */
.main{flex:1;padding:22px;max-width:1400px;margin:0 auto;width:100%}

/* ─── CARDS ─────────────────────────────────────────────── */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:20px}
.card-sm{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:14px}
.panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:14px;margin-bottom:10px}

/* ─── TYPOGRAPHY HELPERS ─────────────────────────────────── */
.title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700}
.sub{font-size:13px;color:var(--text2);margin-top:2px}
.label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block}

/* ─── BADGES ─────────────────────────────────────────────── */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em}
.bg-y{background:rgba(240,192,64,.15);color:var(--accent)}
.bg-g{background:rgba(61,214,140,.15);color:var(--accent2)}
.bg-b{background:rgba(91,156,246,.15);color:var(--accent3)}
.bg-r{background:rgba(240,85,85,.15);color:var(--danger)}
.bg-o{background:rgba(240,128,64,.15);color:var(--warn)}
.bg-n{background:var(--surface3);color:var(--text2)}

/* ─── BUTTONS ───────────────────────────────────────────── */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:8px 18px;border-radius:var(--rs);font-size:12px;font-weight:700;border:none;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-y{background:var(--accent);color:var(--primary)}
.btn-y:hover:not(:disabled){background:#f5cc55}
.btn-g{background:var(--accent2);color:var(--primary)}
.btn-g:hover:not(:disabled){background:#55e8a8}
.btn-b{background:var(--accent3);color:#fff}
.btn-b:hover:not(:disabled){background:#7baef8}
.btn-r{background:var(--danger);color:#fff}
.btn-r:hover:not(:disabled){background:#f56f6f}
.btn-o{background:var(--warn);color:#fff}
.btn-o:hover:not(:disabled){background:#f59050}
.btn-out{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-out:hover:not(:disabled){border-color:var(--text2);color:var(--text)}
.btn-sm{padding:5px 12px;font-size:10px}
.btn-xs{padding:3px 8px;font-size:9px}
.btn-lg{padding:14px 28px;font-size:15px}
.btn-full{width:100%}

/* ─── FORM INPUTS ────────────────────────────────────────── */
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--rs);padding:9px 13px;font-size:13px;outline:none;transition:border .2s}
.inp:focus{border-color:var(--accent)}
.inp-sm{padding:6px 10px;font-size:12px}
textarea.inp{resize:vertical;min-height:72px}
.frow{display:flex;gap:10px;margin-bottom:12px}
.fcol{flex:1}
.tag{display:inline-flex;align-items:center;gap:5px;background:var(--surface3);border:1px solid var(--border);border-radius:20px;padding:3px 9px;font-size:11px;color:var(--text2)}
.tag button{background:none;border:none;color:var(--text3);font-size:13px;line-height:1;cursor:pointer;padding:0}
.tag button:hover{color:var(--danger)}
.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:7px}

/* ─── GRID ───────────────────────────────────────────────── */
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.flex{display:flex;align-items:center}
.fbetween{display:flex;align-items:center;justify-content:space-between}
.gap8{gap:8px}.gap12{gap:12px}.gap16{gap:16px}

/* ─── STEPS ──────────────────────────────────────────────── */
.steps{display:flex;align-items:center;gap:0;margin-bottom:22px}
.step{display:flex;align-items:center;gap:7px}
.snum{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;border:2px solid var(--border);color:var(--text3);flex-shrink:0;transition:all .3s}
.snum.done{background:var(--accent2);border-color:var(--accent2);color:var(--primary)}
.snum.cur{background:var(--accent);border-color:var(--accent);color:var(--primary)}
.slabel{font-size:11px;color:var(--text3);white-space:nowrap}
.slabel.cur{color:var(--text)}
.ssep{flex:1;height:1px;background:var(--border);margin:0 6px}

/* ─── TABS ───────────────────────────────────────────────── */
.tabs{display:flex;gap:3px;background:var(--surface2);border-radius:var(--rs);padding:3px;width:fit-content;margin-bottom:18px}
.tab{padding:6px 16px;border-radius:6px;font-size:12px;font-weight:700;cursor:pointer;border:none;background:none;color:var(--text2);transition:all .2s;text-transform:uppercase;letter-spacing:.05em}
.tab.active{background:var(--accent);color:var(--primary)}
.tab:hover:not(.active){color:var(--text)}

/* ─── BRACKET BUTTONS ────────────────────────────────────── */
.brkt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px;margin-top:14px}
.brkt-btn{background:var(--surface2);border:2px solid var(--border);border-radius:var(--r);padding:22px 14px;text-align:center;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.brkt-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(240,192,64,.07),transparent);opacity:0;transition:.3s}
.brkt-btn:hover::after{opacity:1}
.brkt-btn:hover{border-color:var(--accent);transform:translateY(-2px)}
.brkt-btn.sel{border-color:var(--accent);background:rgba(240,192,64,.07)}
.brkt-letter{font-family:'Barlow Condensed',sans-serif;font-size:48px;font-weight:900;color:var(--accent);line-height:1}
.brkt-label{font-size:12px;font-weight:700;color:var(--text2);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.brkt-meta{font-size:10px;color:var(--text3);margin-top:3px}

/* ─── MATCH CARDS ────────────────────────────────────────── */
.mc{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:12px 14px;cursor:grab;transition:all .2s;user-select:none;margin-bottom:8px}
.mc:active{cursor:grabbing;opacity:.7;transform:scale(.98)}
.mc.cur{border-color:var(--accent2);background:rgba(61,214,140,.05)}
.mc.queued{border-color:var(--accent3);background:rgba(91,156,246,.04)}
.mc.done{opacity:.55}
.mc-team{font-size:13px;font-weight:600;color:var(--text)}
.mc-vs{font-size:9px;color:var(--text3);text-align:center;margin:3px 0;text-transform:uppercase;font-weight:700;letter-spacing:.12em}
.mc-score{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--accent)}

/* ─── COURT DISPLAY ──────────────────────────────────────── */
.court{background:linear-gradient(145deg,#1b4a28,#2d6b3e);border:2px solid #3a7a4a;border-radius:var(--r);padding:20px;position:relative;overflow:hidden}
.court::before{content:'';position:absolute;inset:0;background:
  repeating-linear-gradient(0deg,transparent,transparent 38px,rgba(255,255,255,.04) 38px,rgba(255,255,255,.04) 39px),
  repeating-linear-gradient(90deg,transparent,transparent 38px,rgba(255,255,255,.04) 38px,rgba(255,255,255,.04) 39px)}
.court-net{position:absolute;left:50%;top:25%;bottom:25%;width:3px;background:rgba(255,255,255,.35);transform:translateX(-50%)}
.court-players{display:grid;grid-template-columns:1fr auto 1fr;gap:12px;align-items:center;position:relative;z-index:1}
.court-side{text-align:center}
.court-name{font-family:'Barlow Condensed',sans-serif;font-size:17px;font-weight:700;color:#fff;text-shadow:0 1px 4px rgba(0,0,0,.4)}
.court-sc{font-family:'Barlow Condensed',sans-serif;font-size:54px;font-weight:900;color:var(--accent);line-height:1;text-shadow:0 2px 8px rgba(0,0,0,.3)}
.court-vs{font-size:11px;color:rgba(255,255,255,.35);text-align:center;text-transform:uppercase;letter-spacing:.12em}

/* ─── SCORE MODAL INPUTS ─────────────────────────────────── */
.sib{background:var(--surface2);border:2px solid var(--border);border-radius:var(--rs);padding:18px;text-align:center}
.sib.active{border-color:var(--accent)}
.sid{font-family:'Barlow Condensed',sans-serif;font-size:60px;font-weight:900;color:var(--accent);line-height:1}
.sbtn{width:48px;height:48px;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--rs);font-size:20px;font-weight:700;color:var(--text);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center}
.sbtn:hover{background:var(--accent);color:var(--primary)}

/* ─── STANDINGS TABLE ────────────────────────────────────── */
.stbl{width:100%;border-collapse:collapse;font-size:12px}
.stbl th{padding:7px 10px;text-align:left;color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);font-weight:700}
.stbl td{padding:9px 10px;border-bottom:1px solid rgba(58,66,96,.4)}
.stbl tr:hover td{background:rgba(255,255,255,.02)}

/* ─── TOURNAMENT BRACKET VISUAL ──────────────────────────── */
.brkt-visual{overflow-x:auto;padding:8px 0}
.bv-stage{display:flex;flex-direction:column;gap:14px;min-width:190px}
.bv-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;text-align:center;margin-bottom:7px}
.bv-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;min-width:175px}
.bv-team{padding:7px 11px;font-size:12px;font-weight:600;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.bv-team.win{color:var(--accent2);background:rgba(61,214,140,.06)}
.bv-team.bye{color:var(--text3);font-style:italic}

/* ─── ADMIN HOME CARDS ───────────────────────────────────── */
.home-stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:16px;text-align:center}
.home-stat-n{font-family:'Barlow Condensed',sans-serif;font-size:36px;font-weight:900;color:var(--accent);line-height:1}
.home-stat-l{font-size:11px;color:var(--text2);margin-top:4px;text-transform:uppercase;letter-spacing:.05em}

/* ─── END TOURNAMENT BANNER ──────────────────────────────── */
.end-banner{background:linear-gradient(135deg,rgba(240,192,64,.12),rgba(61,214,140,.08));border:1px solid var(--accent);border-radius:var(--r);padding:20px 24px}

/* ─── HISTORY TABLE ──────────────────────────────────────── */
.htbl{width:100%;border-collapse:collapse;font-size:12px}
.htbl th{padding:9px 13px;text-align:left;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);font-weight:700}
.htbl td{padding:11px 13px;border-bottom:1px solid rgba(58,66,96,.35);font-size:13px}
.htbl tr:hover td{background:rgba(255,255,255,.02)}

/* ─── MODAL ──────────────────────────────────────────────── */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:26px;width:100%;max-width:490px;max-height:92vh;overflow-y:auto}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;margin-bottom:18px}

/* ─── LOGIN ──────────────────────────────────────────────── */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:var(--primary);position:relative;overflow:hidden}
.login-wrap::before{content:'';position:absolute;width:700px;height:700px;background:radial-gradient(circle,rgba(240,192,64,.07) 0%,transparent 70%);top:-200px;right:-200px;pointer-events:none}
.login-wrap::after{content:'';position:absolute;width:500px;height:500px;background:radial-gradient(circle,rgba(61,214,140,.05) 0%,transparent 70%);bottom:-100px;left:-100px;pointer-events:none}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:44px 38px;width:100%;max-width:400px;position:relative;z-index:1}
.login-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:30px;color:var(--accent);text-align:center;letter-spacing:.06em}
.login-sub{color:var(--text2);text-align:center;font-size:13px;margin-bottom:30px;margin-top:2px}
.roles{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:22px}
.role-btn{background:var(--surface2);border:2px solid transparent;border-radius:var(--rs);padding:11px 8px;text-align:center;cursor:pointer;transition:all .2s}
.role-btn.sel{border-color:var(--accent);background:rgba(240,192,64,.1)}
.role-icon{font-size:20px;margin-bottom:3px}
.role-name{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}
.role-btn.sel .role-name{color:var(--accent)}

/* ─── TOAST ──────────────────────────────────────────────── */
.toast-wrap{position:fixed;bottom:20px;right:20px;z-index:3000;display:flex;flex-direction:column;gap:7px}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--rs);padding:10px 16px;font-size:12px;display:flex;align-items:center;gap:8px;animation:tIn .3s ease;max-width:280px}
.toast.ok{border-color:var(--accent2);color:var(--accent2)}
.toast.er{border-color:var(--danger);color:var(--danger)}
.toast.inf{border-color:var(--accent3);color:var(--accent3)}
.toast.sy{border-color:var(--accent);color:var(--accent)}
@keyframes tIn{from{transform:translateX(110%);opacity:0}to{transform:none;opacity:1}}

/* ─── EMPTY STATE ────────────────────────────────────────── */
.empty{text-align:center;padding:44px 20px;color:var(--text3)}
.empty-i{font-size:44px;margin-bottom:10px;opacity:.35}
.empty-t{font-size:15px;color:var(--text2)}
.empty-s{font-size:12px;color:var(--text3);margin-top:5px}

/* ─── SCROLL AREA ────────────────────────────────────────── */
.scroll{max-height:390px;overflow-y:auto;padding-right:3px}

/* ─── SHEET SYNC INDICATOR ───────────────────────────────── */
.sync-badge{display:inline-flex;align-items:center;gap:5px;font-size:10px;padding:3px 9px;border-radius:20px;background:rgba(61,214,140,.1);color:var(--accent2);border:1px solid rgba(61,214,140,.2)}
.sync-badge.syncing{background:rgba(240,192,64,.1);color:var(--accent);border-color:rgba(240,192,64,.2)}
.sync-badge.err{background:rgba(240,85,85,.1);color:var(--danger);border-color:rgba(240,85,85,.2)}

/* ─── RESPONSIVE ─────────────────────────────────────────── */
@media(max-width:720px){
  .g2,.g3,.g4{grid-template-columns:1fr}
  .brkt-grid{grid-template-columns:repeat(auto-fill,minmax(110px,1fr))}
  .main{padding:14px}
  .nav{gap:6px}
  .nav-tab{font-size:10px;padding:4px 8px}
}
hr.sep{border:none;border-top:1px solid var(--border);margin:18px 0}
</style>
</head>
<body>
<div id="app"></div>
<div class="toast-wrap" id="toasts"></div>

<script>
// ═══════════════════════════════════════════════════════════
//  CONFIGURATION
// ═══════════════════════════════════════════════════════════
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzdnFUHUwp3tEacOem6QF7uEk4GSXMEJYjiPArJMRkAEov-aKyhCdSbY9FyPsa7lHKF-Q/exec';

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
const S = {
  view:'login',role:null,user:null,
  sheetsUrl: APPS_SCRIPT_URL,
  sheetsStatus:'off', // off | ok | err | syncing
  sheetsMsg:'',
  adminTab:'home',
  matchTab:'rr', pubTab:'standings',
  tournament:null,
  selectedLvl:null, selectedBr:null,
  currentMatch:null, matchQueue:[],
  scoreModal:null, crossScoreModal:null,
  userModal:null, endModal:false,
  dragSrc:null,
  history:[],
  historyLoaded:false,
  _loginRole:'admin', _loginErr:'',
  _tCat:null,
  users:[
    {id:1,username:'admin',password:'admin123',role:'admin',name:'Tournament Admin'},
    {id:2,username:'scorer',password:'scorer123',role:'scorer',name:'Court Scorer'},
    {id:3,username:'superadmin',password:'super123',role:'superadmin',name:'Super Admin'},
  ],
};

// ═══════════════════════════════════════════════════════════
//  GOOGLE SHEETS INTEGRATION
// ═══════════════════════════════════════════════════════════
async function sheetsPost(action, data) {
  const url = S.sheetsUrl.trim();
  if (!url) { S.sheetsStatus='off'; return {ok:false,error:'No URL set'}; }
  S.sheetsStatus='syncing';
  updateSheetsDot();
  try {
    const res = await fetch(url, {
      method:'POST',
      headers:{'Content-Type':'text/plain'},
      body: JSON.stringify({action, data})
    });
    const json = await res.json();
    S.sheetsStatus = json.ok ? 'ok' : 'err';
    S.sheetsMsg = json.ok ? 'Synced ' + new Date().toLocaleTimeString() : (json.error||'Error');
    updateSheetsDot();
    return json;
  } catch(e) {
    S.sheetsStatus='err'; S.sheetsMsg=e.message;
    updateSheetsDot();
    return {ok:false,error:e.message};
  }
}

function updateSheetsDot(){
  // Only patch the dot in the sbar so we don't blow away the whole render
  const dot=document.querySelector('.sbar .sdot');
  if(!dot) return;
  const cls={off:'off',ok:'ok',err:'err',syncing:'wait'};
  dot.className='sdot '+(cls[S.sheetsStatus]||'off');
}

async function syncSetup() {
  if (!S.tournament) return;
  const t = S.tournament;

async function syncEndTournament() {

  // Find champion from crossover
  let champion = '', runnerUp = '';
  if (t.crossover) {
    const finals = t.crossover.stages.find(s=>s.name==='Final');
    if (finals && finals.matches[0]) {
      const fm = finals.matches[0];
      if (fm.winner) champion = fmtPair(fm.winner.pair);
      const loser = fm.winner && fm.t1 && fm.t2 ?
        (JSON.stringify(fm.winner.pair)===JSON.stringify(fm.t1.pair)?fm.t2:fm.t1) : null;
      if (loser) runnerUp = fmtPair(loser.pair);
    }
  }
  const totalPlayers = t.levels.reduce((a,l)=>a+l.players.length,0);
  const totalMatches = t.levels.reduce((a,l)=>a+l.brackets.reduce((b,br)=>b+br.matches.length,0),0);
  const res = await sheetsPost('endTournament', {
    tournamentName: t.name,
    category: t.category,
    totalPlayers,
    champion,
    runnerUp,
    totalMatches,
    createdAt: t.created,
    endedAt: new Date().toISOString()
  });
  if (res.ok) {
    toast('Tournament saved to history!','ok');
    // Save to local history
    const entry = {
      id: S.history.length+1, name:t.name, category:t.category,
      totalPlayers, champion, runnerUp, totalMatches,
      createdAt:t.created, endedAt:new Date().toISOString()
    };
    S.history.unshift(entry);
  }
}

function toast(msg,type='inf'){
  const tc=document.getElementById('toasts');
  const t=document.createElement('div');

  tc.appendChild(t);

}

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
function gid(){return Math.random().toString(36).slice(2,9)}

function fmtPair(pair,t,showTier){
  if(!pair) return 'TBD';
  if(typeof pair==='string') return pair;
  if(!t||t.category==='Doubles'){
    const names=pair.filter(Boolean);
    if(!names.length) return 'TBD';
    return names.join(' / ');
  }
  return pair[0]||'TBD';
}

// Returns pair display with optional High/Mid tier labels
function fmtPairDetailed(pair, lvl, t){
  if(!pair||!t) return fmtPair(pair,t);
  if(t.category!=='Doubles'||!lvl||lvl.pairingMode!=='balanced') return fmtPair(pair,t);
  const names=pair.filter(p=>p&&p!=='TBD');
  return names.map(n=>{
    const isH=lvl.highPlayers&&lvl.highPlayers.includes(n);
    const isM=lvl.midPlayers&&lvl.midPlayers.includes(n);
    if(isH) return `${n}<sup style="font-size:8px;color:var(--accent);font-weight:700;margin-left:2px">H</sup>`;
    if(isM) return `${n}<sup style="font-size:8px;color:var(--accent3);font-weight:700;margin-left:2px">M</sup>`;
    return n;
  }).join(' / ');
}

// ═══════════════════════════════════════════════════════════
//  ROUND ROBIN
// ═══════════════════════════════════════════════════════════
function genRoundRobin(pairs){
  const n=pairs.length; if(n<2) return [];
  const list=n%2===0?[...pairs]:[...pairs,'BYE'];
  const len=list.length;
  const matches=[];
  for(let r=0;r<len-1;r++){
    for(let i=0;i<len/2;i++){
      const a=list[i],b=list[len-1-i];
      if(a!=='BYE'&&b!=='BYE')
        matches.push({id:gid(),team1:a,team2:b,score1:null,score2:null,status:'pending',round:r+1});
    }
    list.splice(1,0,list.pop());
  }
  return matches;
}

// ═══════════════════════════════════════════════════════════
//  STANDINGS
// ═══════════════════════════════════════════════════════════
function computeStandings(pairs,matches){
  const map={};
  pairs.forEach(p=>{const k=JSON.stringify(p);map[k]={pair:p,key:k,W:0,L:0,PF:0,PA:0,pts:0};});
  matches.filter(m=>m.status==='finished').forEach(m=>{
    const k1=JSON.stringify(m.team1),k2=JSON.stringify(m.team2);
    if(!map[k1]||!map[k2]) return;
    const s1=m.score1||0,s2=m.score2||0;
    map[k1].PF+=s1;map[k1].PA+=s2;map[k2].PF+=s2;map[k2].PA+=s1;
    if(s1>s2){map[k1].W++;map[k1].pts+=2;map[k2].L++;}
    else if(s2>s1){map[k2].W++;map[k2].pts+=2;map[k1].L++;}
    else{map[k1].pts++;map[k2].pts++;}
  });
  return Object.values(map).sort((a,b)=>{
    if(b.pts!==a.pts) return b.pts-a.pts;
    const hth=h2h(a.pair,b.pair,matches);
    if(hth) return hth;
    return (b.PF-b.PA)-(a.PF-a.PA);
  });
}

function h2h(pA,pB,matches){
  const m=matches.find(m=>{
    const sa=JSON.stringify(pA),sb=JSON.stringify(pB);
    return (JSON.stringify(m.team1)===sa&&JSON.stringify(m.team2)===sb)||
           (JSON.stringify(m.team1)===sb&&JSON.stringify(m.team2)===sa);
  });
  if(!m||m.status!=='finished') return 0;
  const myFirst=JSON.stringify(m.team1)===JSON.stringify(pA);
  const s1=m.score1||0,s2=m.score2||0;
  if(myFirst) return s1>s2?-1:s2>s1?1:0;
  return s2>s1?-1:s1>s2?1:0;
}

function refreshStandings(){
  if(!S.tournament) return;
  S.tournament.levels.forEach(l=>l.brackets.forEach(b=>{
    b.standings=computeStandings(b.pairs,b.matches);
  }));
}

// ═══════════════════════════════════════════════════════════
//  BRACKET / CROSSOVER
// ═══════════════════════════════════════════════════════════
function generateBrackets(lvlId,n){
  const lvl=S.tournament.levels.find(l=>l.id===lvlId);
  if(!lvl){toast('Level not found','er');return;}
  const cat=S.tournament.category;
  const isBalanced = cat==='Doubles' && lvl.pairingMode==='balanced';

  let pairs;

  if(cat==='Singles'){
    // Singles — just shuffle all players
    const allP = isBalanced
      ? [...lvl.highPlayers,...lvl.midPlayers]
      : lvl.players;
    if(allP.length<2){toast('Need at least 2 players','er');return;}
    pairs = shuffle(allP).map(p=>[p]);

  } else if(isBalanced){
    // BALANCED DOUBLES — pair High + Intermediate
    if(lvl.highPlayers.length+lvl.midPlayers.length<2){toast('Need at least 2 players total','er');return;}
    const highs = shuffle([...lvl.highPlayers]);
    const mids  = shuffle([...lvl.midPlayers]);
    pairs = [];
    // 1. Pair one high with one mid as much as possible
    const balancedCount = Math.min(highs.length, mids.length);
    for(let i=0;i<balancedCount;i++){
      pairs.push([highs[i], mids[i]]);
    }
    // 2. Remaining unmatched — pair with each other (overflow)
    const leftoverH = highs.slice(balancedCount);
    const leftoverM = mids.slice(balancedCount);
    const overflow = [...leftoverH, ...leftoverM];
    for(let i=0;i<overflow.length-1;i+=2){
      pairs.push([overflow[i], overflow[i+1]]);
    }
    if(overflow.length%2!==0){
      pairs.push([overflow[overflow.length-1],'TBD']);
    }
    // Shuffle pair ORDER (not the players within pairs) for bracket randomness
    pairs = shuffle(pairs);

  } else {
    // RANDOM DOUBLES — shuffle all and pair consecutively
    if(lvl.players.length<2){toast('Need at least 2 players','er');return;}
    const sh = shuffle(lvl.players);
    pairs = [];
    for(let i=0;i<sh.length-1;i+=2) pairs.push([sh[i],sh[i+1]]);
    if(sh.length%2) pairs.push([sh[sh.length-1],'TBD']);
  }

  // Distribute pairs across brackets
  const perB = Math.ceil(pairs.length/n);
  lvl.brackets = [];
  for(let b=0;b<n;b++){
    const bp = pairs.slice(b*perB,(b+1)*perB);
    if(!bp.length) continue;
    const matches = genRoundRobin(bp);
    lvl.brackets.push({
      id:gid(),
      label:'Bracket '+String.fromCharCode(65+b),
      pairs:bp, matches,
      standings:computeStandings(bp,matches),
      balanced: isBalanced
    });
  }

  // Also sync lvl.players for backwards-compat display
  if(isBalanced){
    lvl.players = [...lvl.highPlayers,...lvl.midPlayers];
  }

  render();
  toast(`Brackets generated${isBalanced?' (Balanced High+Mid)':''}!`,'ok');
  if(S.sheetsUrl.trim()) setTimeout(syncSetup,400);
}

function allBrDone(){
  if(!S.tournament) return false;
  return S.tournament.levels.every(l=>l.brackets.length&&l.brackets.every(b=>b.matches.every(m=>m.status==='finished')));
}

function initCrossover(){
  refreshStandings();
  const t=S.tournament;
  const rank1=[];
  t.levels.forEach(l=>l.brackets.forEach(b=>{
    if(b.standings[0]) rank1.push({pair:b.standings[0].pair,from:b.label,levelId:l.id,bracketId:b.id});
  }));
  if(rank1.length<2){toast('Need at least 2 brackets','er');return;}
  const shuf=shuffle(rank1);
  t.crossover={stages:buildStages(shuf)};
  render();
  toast('Crossover bracket created!','ok');
}

function buildStages(teams){
  const n=teams.length;
  if(n===2) return [{name:'Final',matches:[{id:gid(),t1:teams[0],t2:teams[1],score1:null,score2:null,status:'pending',winner:null}]}];
  if(n===3){
    const byeIdx=Math.floor(Math.random()*3);
    const bye=teams[byeIdx];
    const oth=teams.filter((_,i)=>i!==byeIdx);
    return [
      {name:'Semi-Final',matches:[
        {id:gid(),t1:oth[0],t2:oth[1],score1:null,score2:null,status:'pending',winner:null},
        {id:gid(),t1:bye,t2:null,score1:null,score2:null,status:'bye',winner:bye,isBye:true},
      ]},
      {name:'Final',matches:[{id:gid(),t1:null,t2:null,score1:null,score2:null,status:'pending',winner:null}]}
    ];
  }
  if(n===4) return [
    {name:'Semi-Final',matches:[
      {id:gid(),t1:teams[0],t2:teams[3],score1:null,score2:null,status:'pending',winner:null},
      {id:gid(),t1:teams[1],t2:teams[2],score1:null,score2:null,status:'pending',winner:null},
    ]},
    {name:'Final',matches:[{id:gid(),t1:null,t2:null,score1:null,score2:null,status:'pending',winner:null}]}
  ];
  // Generic
  const half=Math.ceil(n/2);
  const semis=[];
  for(let i=0;i<half;i++){
    const opp=teams[n-1-i]||null;
    semis.push({id:gid(),t1:teams[i],t2:opp,score1:null,score2:null,status:opp?'pending':'bye',winner:opp?null:teams[i],isBye:!opp});
  }
  const stages=[{name:'Quarter-Final',matches:semis}];
  const sfCount=Math.ceil(half/2);
  const sfMatches=[];
  for(let i=0;i<sfCount;i++) sfMatches.push({id:gid(),t1:null,t2:null,score1:null,score2:null,status:'pending',winner:null});
  stages.push({name:'Semi-Final',matches:sfMatches});
  stages.push({name:'Final',matches:[{id:gid(),t1:null,t2:null,score1:null,score2:null,status:'pending',winner:null}]});
  return stages;
}

function advanceCrossover(si,mi,winner){
  const stages=S.tournament.crossover.stages;
  const m=stages[si].matches[mi];
  m.winner=winner; m.status='finished';
  const nextStage=stages[si+1];
  if(nextStage){
    const nm=nextStage.matches.find(x=>!x.t1||!x.t2);
    if(nm){if(!nm.t1) nm.t1=winner; else if(!nm.t2) nm.t2=winner;}
  }
}

            return `<div style="margin-bottom:6px">
              <div class="fbetween" style="margin-bottom:3px">
                <span style="font-size:11px">${b.label}</span>
                <span style="font-size:10px;color:var(--text3)">${done}/${tot}</span>
              </div>
              <div style="background:var(--border);border-radius:4px;height:5px">
                <div style="background:${pct===100?'var(--accent2)':'var(--accent)'};width:${pct}%;height:100%;border-radius:4px;transition:width .4s"></div>
              </div>
            </div>`;
          }).join('')}
        </div>`).join('')}
      </div>
      <div class="card">
        <div class="fbetween" style="margin-bottom:12px">
          <div style="font-weight:700">Quick Queue</div>
          <span class="badge bg-b">${S.matchQueue.length} queued</span>
        </div>
        ${S.matchQueue.length?S.matchQueue.slice(0,5).map((q,i)=>{
          const m=getBrMatch(q.bracketId,q.matchId);
          const {lvl,br}=getLvlAndBr(q.bracketId);
          if(!m) return '';
          return `<div class="panel fbetween">
            <div>
              <div style="font-size:10px;color:var(--text3)">#${i+1} · ${br?.label||''}</div>
              <div style="font-size:12px;font-weight:600">${fmtPair(m.team1,S.tournament)} <span style="color:var(--text3)">vs</span> ${fmtPair(m.team2,S.tournament)}</div>
            </div>
            <button class="btn btn-y btn-xs" onclick="startMatch('${m.id}','${q.bracketId}','${q.levelId}')">Start</button>
          </div>`;
        }).join(''):
        `<div class="empty" style="padding:20px"><div class="empty-i">📋</div><div class="empty-t" style="font-size:12px">No matches queued</div></div>`}
      </div>
    </div>
  </div>`;
}

function getFinalist(){
  const t=S.tournament;
  if(!t||!t.crossover) return null;
  const finals=t.crossover.stages.find(s=>s.name==='Final');
  if(!finals) return null;
  const fm=finals.matches[0];
  if(!fm||fm.status!=='finished') return null;
  return fmtPair(fm.winner?.pair,t);
}

function doLogin(){
  const role=S._loginRole;
  if(!role){toast('Select a role','er');return;}
  if(role==='public'){S.user={name:'Public Viewer'};S.role='public';S.adminTab='public-view';render();return;}
  const u=document.getElementById('li-u')?.value;
  const p=document.getElementById('li-p')?.value;
  const found=S.users.find(x=>x.username===u&&x.password===p&&x.role===role);

  S.user=found;S.role=role;
  S.adminTab=role==='superadmin'?'home':role==='scorer'?'score-entry':'home';
  render();
}

      <div style="background:rgba(91,156,246,.05);border:1px solid rgba(91,156,246,.2);border-radius:var(--rs);padding:12px">
        <div style="display:flex;align-items:center;gap:7px;margin-bottom:8px">
          <span style="font-size:14px">⭐</span>
          <span class="label" style="margin:0;color:var(--accent3)">Intermediate Players</span>
          <span class="badge bg-b" style="margin-left:auto">${lvl.midPlayers.length}</span>
        </div>
        <textarea class="inp inp-sm" id="mp-${lvl.id}" rows="4"
          placeholder="One name per line&#10;e.g. Pedro, Rosa…" style="margin-bottom:7px"></textarea>
        <button class="btn btn-b btn-sm btn-full" onclick="addMidPlayers('${lvl.id}')">+ Add Intermediate Players</button>
        ${lvl.midPlayers.length?`<div class="tags" style="margin-top:7px">
          ${lvl.midPlayers.map((p,i)=>`<span class="tag" style="border-color:rgba(91,156,246,.3)">${p}
            <button onclick="rmMidPlayer('${lvl.id}',${i})">×</button></span>`).join('')}
        </div>`:''}
      </div>
    </div>
    ${lvl.highPlayers.length>0||lvl.midPlayers.length>0 ? `
      <div style="font-size:11px;padding:7px 10px;background:var(--surface3);border-radius:6px;margin-bottom:10px;color:var(--text2)">
        ${lvl.highPlayers.length} High + ${lvl.midPlayers.length} Intermediate
        = <strong>${Math.min(lvl.highPlayers.length,lvl.midPlayers.length)}</strong> balanced pair${Math.min(lvl.highPlayers.length,lvl.midPlayers.length)!==1?'s':''} possible
        ${lvl.highPlayers.length!==lvl.midPlayers.length?`
        <span style="color:var(--warn)"> · ⚠ Uneven pools — ${Math.abs(lvl.highPlayers.length-lvl.midPlayers.length)} extra ${lvl.highPlayers.length>lvl.midPlayers.length?'High':'Intermediate'} player${Math.abs(lvl.highPlayers.length-lvl.midPlayers.length)!==1?'s':''} will be paired together.</span>`:''}
      </div>` : ''}
    ` : `
    <!-- RANDOM MODE: single pool -->
    <div class="frow" style="margin-bottom:10px">
      <div class="fcol">
        <label class="label">Add Players (one per line)</label>
        <textarea class="inp" id="pl-${lvl.id}" rows="3" placeholder="Player names..."></textarea>
      </div>
      <div class="fcol" style="display:flex;flex-direction:column;justify-content:flex-end;gap:7px;max-width:120px">
        <button class="btn btn-y btn-sm" onclick="addPlayersInput('${lvl.id}')">Add</button>
        ${lvl.players.length?`<button class="btn btn-out btn-sm" onclick="clearPl('${lvl.id}')">Clear All</button>`:''}
      </div>
    </div>
    ${lvl.players.length?`<div class="tags" style="margin-bottom:10px">
      ${lvl.players.map((p,i)=>`<span class="tag">${p}<button onclick="rmPlayer('${lvl.id}',${i})">×</button></span>`).join('')}
    </div>`:''}
    `}

    <!-- Bracket count + generate -->
    ${(lvl.pairingMode==='balanced'?(lvl.highPlayers.length+lvl.midPlayers.length>=2):lvl.players.length>=2)?`
    <div style="display:flex;align-items:flex-end;gap:10px;flex-wrap:wrap;margin-top:4px">
      <div>
        <label class="label">Number of Brackets</label>
        <input class="inp inp-sm" type="number" id="nbr-${lvl.id}" min="1" max="8"
          value="${lvl.brackets.length||1}" style="width:80px"/>
      </div>
      <button class="btn btn-g btn-sm" onclick="genBrackets('${lvl.id}')">Generate Brackets</button>
      ${lvl.brackets.length?`<button class="btn btn-out btn-sm" onclick="clearBrackets('${lvl.id}')">Regenerate</button>`:''}
    </div>`:''}

    ${lvl.brackets.length?`<div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
      ${lvl.brackets.map(b=>`<span class="badge bg-g">✓ ${b.label} · ${b.pairs.length} pair${b.pairs.length!==1?'s':''}</span>`).join('')}
    </div>`:''}
  </div>`;
}

function setPairingMode(lvlId, mode){
  const l=S.tournament.levels.find(x=>x.id===lvlId);
  if(!l) return;
  l.pairingMode=mode;
  l.brackets=[];
  render();
}

function addHighPlayers(lvlId){
  const ta=document.getElementById(`hp-${lvlId}`);if(!ta)return;
  const lines=ta.value.split('\n').map(s=>s.trim()).filter(Boolean);
  const l=S.tournament.levels.find(x=>x.id===lvlId);
  if(l){l.highPlayers=[...l.highPlayers,...lines];l.brackets=[];}
  render();
}
function addMidPlayers(lvlId){
  const ta=document.getElementById(`mp-${lvlId}`);if(!ta)return;
  const lines=ta.value.split('\n').map(s=>s.trim()).filter(Boolean);
  const l=S.tournament.levels.find(x=>x.id===lvlId);
  if(l){l.midPlayers=[...l.midPlayers,...lines];l.brackets=[];}
  render();
}
function rmHighPlayer(lvlId,idx){
  const l=S.tournament.levels.find(x=>x.id===lvlId);
  if(l){l.highPlayers.splice(idx,1);l.brackets=[];render();}
}
function rmMidPlayer(lvlId,idx){
  const l=S.tournament.levels.find(x=>x.id===lvlId);
  if(l){l.midPlayers.splice(idx,1);l.brackets=[];render();}
}

function delLevel(id){S.tournament.levels=S.tournament.levels.filter(l=>l.id!==id);render();}
function addPlayersInput(lvlId){
  const ta=document.getElementById(`pl-${lvlId}`);if(!ta)return;
  const lines=ta.value.split('\n').map(s=>s.trim()).filter(Boolean);
  const lvl=S.tournament.levels.find(l=>l.id===lvlId);
  if(lvl){lvl.players=[...lvl.players,...lines];lvl.brackets=[];}
  render();
}
function clearPl(lvlId){const l=S.tournament.levels.find(x=>x.id===lvlId);if(l){l.players=[];l.brackets=[];render();}}
function clearBrackets(lvlId){const l=S.tournament.levels.find(x=>x.id===lvlId);if(l){l.brackets=[];render();}}
function rmPlayer(lvlId,idx){const l=S.tournament.levels.find(x=>x.id===lvlId);if(l){l.players.splice(idx,1);l.brackets=[];render();}}
function genBrackets(lvlId){
  const n=parseInt(document.getElementById(`nbr-${lvlId}`)?.value)||1;
  generateBrackets(lvlId,n);
}

function renderMatches(){
  const t=S.tournament;
  if(!t||!t.levels.length||!t.levels[0].brackets.length)
    return `<div class="empty"><div class="empty-i">🏸</div><div class="empty-t">No brackets yet</div><div class="empty-s">Complete setup first</div><button class="btn btn-y" style="margin-top:14px" onclick="ST('tournament-setup')">Go to Setup</button></div>`;
  return `<div>
    <div class="tabs">
      <div class="tab${S.matchTab!=='xo'?' active':''}" onclick="S.matchTab='rr';render()">Round Robin</div>
      <div class="tab${S.matchTab==='xo'?' active':''}" onclick="S.matchTab='xo';render()">Crossover</div>
    </div>
    ${S.matchTab==='xo'?renderXO():renderRR()}
  </div>`;
}

function renderRR(){
  const t=S.tournament;
  return `<div>
    ${t.levels.map(lvl=>`<div style="margin-bottom:24px">
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;margin-bottom:10px">${lvl.name}</div>
      <div class="brkt-grid">
        ${lvl.brackets.map(br=>{
          const done=br.matches.filter(m=>m.status==='finished').length;
          const tot=br.matches.length;
          return `<div class="brkt-btn${S.selectedLvl===lvl.id&&S.selectedBr===br.id?' sel':''}" onclick="selBr('${lvl.id}','${br.id}')">
            <div class="brkt-letter">${br.label.replace('Bracket ','')}</div>
            <div class="brkt-label">${br.label}</div>
            <div class="brkt-meta">${br.pairs.length} pairs · ${done}/${tot}</div>
            ${done===tot&&tot>0?'<div style="margin-top:6px"><span class="badge bg-g">Complete</span></div>':''}
          </div>`;
        }).join('')}
      </div>
    </div>`).join('')}
    ${S.selectedLvl&&S.selectedBr?renderBrDetail():''}
    ${allBrDone()?`<div class="card" style="border-color:var(--accent2);margin-top:14px">
      <div class="fbetween">
        <div><div style="font-weight:700;color:var(--accent2)">All Round Robin Complete!</div><div style="font-size:12px;color:var(--text2)">Generate the crossover stage.</div></div>
        <button class="btn btn-g" onclick="initCrossover();S.matchTab='xo';render()">Crossover →</button>
      </div>
    </div>`:''}
  </div>`;
}

function selBr(lvlId,brId){
  if(S.selectedLvl===lvlId&&S.selectedBr===brId){S.selectedLvl=null;S.selectedBr=null;}
  else{S.selectedLvl=lvlId;S.selectedBr=brId;}
  render();
}

function renderBrDetail(){
  const {lvl,br}=getLvlAndBr(S.selectedBr);
  if(!br) return '';
  const curM=S.currentMatch&&S.currentMatch.bracketId===br.id;
  const qBr=S.matchQueue.filter(q=>q.bracketId===br.id);
  return `<div class="card" style="margin-top:14px">
    <div class="fbetween" style="margin-bottom:14px">
      <div style="font-weight:700;font-size:17px">${br.label} — ${lvl?.name}${br.balanced?` <span class="badge bg-y" style="font-size:9px;vertical-align:middle">⚖ Balanced</span>`:''}</div>
      <div style="display:flex;gap:7px">
        <span class="badge bg-n">${br.matches.filter(m=>m.status==='pending').length} pending</span>
        <span class="badge bg-g">${br.matches.filter(m=>m.status==='finished').length} done</span>
      </div>
    </div>
    <div class="g2 gap16">
      <div>
        <div class="label" style="margin-bottom:8px">Matches <span style="color:var(--text3);font-size:9px;font-weight:400">(drag to reorder)</span></div>
        <div class="scroll">
          ${br.matches.map((m,i)=>renderMC(m,i,br.id,lvl?.id,qBr,curM)).join('')}
        </div>
      </div>
      <div>
        <div class="label" style="margin-bottom:8px">Standings${lvl?.pairingMode==='balanced'?` <span style="font-size:9px;color:var(--text3)">(🔥H = High · ⭐M = Mid)</span>`:''}</div>
        ${renderStandings(br.standings, lvl)}
        ${curM?`<div style="margin-top:14px"><div class="label" style="margin-bottom:6px">● Current Match</div>${renderCourtMini(S.currentMatch)}</div>`:''}
        ${qBr.length?`<div style="margin-top:12px"><div class="label" style="margin-bottom:6px">Queue (${qBr.length})</div>
          ${qBr.map((q,i)=>{const m=getBrMatch(q.bracketId,q.matchId);return m?`<div class="panel fbetween" style="margin-bottom:5px">
            <div style="font-size:10px;color:var(--text3)">#${i+1}</div>
            <div style="font-size:12px;flex:1;margin:0 8px">${fmtPair(m.team1,S.tournament)} vs ${fmtPair(m.team2,S.tournament)}</div>
            <button class="btn btn-out btn-xs" onclick="dequeue('${m.id}','${br.id}')">✕</button>
          </div>`:'';}).join('')}
        </div>`:''}
      </div>
    </div>
  </div>`;
}

function renderMC(m,i,brId,lvlId,qBr,curM){
  const isCur=curM&&S.currentMatch.matchId===m.id;
  const qPos=qBr.findIndex(q=>q.matchId===m.id);
  const isQ=qPos>-1;
  let cls='mc';
  if(m.status==='finished') cls+=' done';
  else if(isCur) cls+=' cur';
  else if(isQ) cls+=' queued';
  return `<div class="${cls}" draggable="true"
    ondragstart="S.dragSrc='{\"mId\":\"${m.id}\",\"brId\":\"${brId}\"}'"
    ondragover="event.preventDefault()"
    ondrop="doDrop('${m.id}','${brId}')">
    <div style="display:flex;justify-content:space-between;align-items:flex-start">
      <div style="flex:1;min-width:0">
        <div class="mc-team" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${fmtPair(m.team1,S.tournament)}</div>
        <div class="mc-vs">VS</div>
        <div class="mc-team" style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${fmtPair(m.team2,S.tournament)}</div>
      </div>
      <div style="text-align:right;flex-shrink:0;margin-left:8px">
        ${m.status==='finished'?`<div class="mc-score">${m.score1}—${m.score2}</div><span class="badge bg-g" style="margin-top:2px">Done</span>`:
          isCur?`<span class="badge bg-y">● Live</span>`:
          isQ?`<span class="badge bg-b">Q${qPos+1}</span>`:
          `<span class="badge bg-n">R${m.round||i+1}</span>`}
      </div>
    </div>
    ${m.status==='pending'&&!isCur?`<div style="display:flex;gap:5px;margin-top:8px">
      ${!isQ?`<button class="btn btn-b btn-xs" onclick="queueM('${m.id}','${brId}','${lvlId}')">Queue</button>`:
             `<button class="btn btn-out btn-xs" onclick="dequeue('${m.id}','${brId}')">Dequeue</button>`}
      <button class="btn btn-y btn-xs" onclick="startMatch('${m.id}','${brId}','${lvlId}')">Start Now</button>
    </div>`:''}
    ${isCur?`<div style="display:flex;gap:5px;margin-top:8px">
      <button class="btn btn-g btn-xs" onclick="openScore('${m.id}','${brId}','${lvlId}')">Enter Score</button>
    </div>`:''}
  </div>`;
}

function doDrop(targetId,brId){
  if(!S.dragSrc) return;
  let src;
  try{src=JSON.parse(S.dragSrc);}catch{S.dragSrc=null;return;}
  if(src.mId===targetId||src.brId!==brId){S.dragSrc=null;return;}
  for(const lvl of S.tournament.levels)
    for(const br of lvl.brackets)
      if(br.id===brId){
        const ia=br.matches.findIndex(m=>m.id===src.mId);
        const ib=br.matches.findIndex(m=>m.id===targetId);
        if(ia>-1&&ib>-1)[br.matches[ia],br.matches[ib]]=[br.matches[ib],br.matches[ia]];
      }
  S.dragSrc=null;render();toast('Order updated');
}

function queueM(mId,brId,lvlId){
  if(S.matchQueue.find(q=>q.matchId===mId)){toast('Already queued');return;}
  S.matchQueue.push({matchId:mId,bracketId:brId,levelId:lvlId});
  toast('Queued','ok');render();
}
function dequeue(mId,brId){S.matchQueue=S.matchQueue.filter(q=>!(q.matchId===mId&&q.bracketId===brId));render();}

function startMatch(mId,brId,lvlId){
  if(S.currentMatch&&S.currentMatch.bracketId===brId){toast('Match already running in this bracket','er');return;}
  S.currentMatch={matchId:mId,bracketId:brId,levelId:lvlId};
  S.matchQueue=S.matchQueue.filter(q=>!(q.matchId===mId&&q.bracketId===brId));
  toast('Match started!','ok');render();
}

function openScore(mId,brId,lvlId){S.scoreModal={mId,brId,lvlId,s1:0,s2:0};render();}

function renderScoreModal(){
  const sm=S.scoreModal;
  const m=getBrMatch(sm.brId,sm.mId);
  if(!m) return '';
  return `<div class="overlay" onclick="S.scoreModal=null;render()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">Match Score</div>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:18px">
        <div class="sib active">
          <div class="label">${fmtPair(m.team1,S.tournament)}</div>
          <div class="sid">${sm.s1}</div>
          <div style="display:flex;justify-content:center;gap:7px;margin-top:10px">
            <button class="sbtn" onclick="S.scoreModal.s1=Math.max(0,S.scoreModal.s1-1);render()">−</button>
            <button class="sbtn" onclick="S.scoreModal.s1++;render()">+</button>
          </div>
        </div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:var(--text3)">VS</div>
        <div class="sib">
          <div class="label">${fmtPair(m.team2,S.tournament)}</div>
          <div class="sid">${sm.s2}</div>
          <div style="display:flex;justify-content:center;gap:7px;margin-top:10px">
            <button class="sbtn" onclick="S.scoreModal.s2=Math.max(0,S.scoreModal.s2-1);render()">−</button>
            <button class="sbtn" onclick="S.scoreModal.s2++;render()">+</button>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-out" onclick="S.scoreModal=null;render()">Cancel</button>
        <button class="btn btn-g" onclick="submitScore()">Save Score</button>
      </div>
    </div>
  </div>`;
}

async function submitScore(){
  const sm=S.scoreModal;
  const m=getBrMatch(sm.brId,sm.mId);
  const {lvl,br}=getLvlAndBr(sm.brId);
  if(!m) return;
  m.score1=sm.s1;m.score2=sm.s2;m.status='finished';
  refreshStandings();
  // Auto advance queue
  if(S.currentMatch&&S.currentMatch.matchId===sm.mId){
    S.currentMatch=null;
    const next=S.matchQueue.find(q=>q.bracketId===sm.brId);
    if(next){S.currentMatch={...next};S.matchQueue=S.matchQueue.filter(q=>q.matchId!==next.matchId);toast('Next match started!','inf');}
  }
  S.scoreModal=null;
  render();
  toast('Score saved!','ok');
  // Sync to sheets
  if(S.sheetsUrl.trim()) syncMatchScore(m, lvl?.name, br?.label, false);
}

function renderCourtMini(cur){
  const m=getBrMatch(cur.bracketId,cur.matchId);
  if(!m) return '';
  return `<div class="court">
    <div class="court-net"></div>
    <div class="court-players">
      <div class="court-side">
        <div class="court-name">${fmtPair(m.team1,S.tournament)}</div>
        <div class="court-sc">${m.score1!==null?m.score1:'—'}</div>
      </div>
      <div class="court-vs">VS</div>
      <div class="court-side">
        <div class="court-name">${fmtPair(m.team2,S.tournament)}</div>
        <div class="court-sc">${m.score2!==null?m.score2:'—'}</div>
      </div>
    </div>
  </div>`;
}

function renderStandings(standings, lvl){
  if(!standings||!standings.length) return `<div class="empty" style="padding:12px;font-size:12px">No matches played</div>`;
  return `<table class="stbl">
    <thead><tr><th>#</th><th>Pair</th><th>W</th><th>L</th><th>Pts</th></tr></thead>
    <tbody>
      ${standings.map((s,i)=>`<tr>
        <td style="color:${i===0?'var(--accent)':i===1?'var(--text)':'var(--text3)'};font-weight:700">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
        <td style="font-weight:${i<2?700:400};font-size:12px">${fmtPairDetailed(s.pair,lvl,S.tournament)}</td>
        <td style="color:var(--accent2)">${s.W}</td>
        <td style="color:var(--danger)">${s.L}</td>
        <td style="font-weight:700">${s.pts}</td>
      </tr>`).join('')}
    </tbody>
  </table>`;
}

function renderXO(){
  const t=S.tournament;
  if(!t||!t.crossover){
    if(!allBrDone()) return `<div class="empty"><div class="empty-i">🏆</div><div class="empty-t">Complete round robin first</div></div>`;
    return `<div class="card" style="text-align:center;padding:40px">
      <div style="font-size:38px;margin-bottom:10px">🏆</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:6px">Ready for Crossover!</div>
      <div class="sub" style="margin-bottom:18px">All round robin complete.</div>
      <button class="btn btn-y btn-lg" onclick="initCrossover()">Generate Crossover Bracket</button>
    </div>`;
  }
  return `<div>
    <div class="fbetween" style="margin-bottom:18px">
      <div class="title">Crossover Bracket</div>
      <button class="btn btn-out btn-sm" onclick="initCrossover()">↻ Regenerate</button>
    </div>
    ${renderBViz()}

function renderBViz(){
  const t=S.tournament;
  if(!t||!t.crossover) return '';
  return `<div style="overflow-x:auto">
    <div style="display:flex;gap:28px;min-width:max-content;padding:6px">
      ${t.crossover.stages.map((st,si)=>`
        <div class="bv-stage">
          <div class="bv-title">${st.name}</div>
          ${st.matches.map((m,mi)=>`
            <div class="bv-box">
              ${renderBVTeam(m.t1,m,true)}
              ${renderBVTeam(m.t2,m,false)}
              ${m.status==='pending'&&m.t1&&m.t2?`<div style="padding:7px;border-top:1px solid var(--border)">
                <button class="btn btn-y btn-xs btn-full" onclick="S.crossScoreModal={si:${si},mi:${mi},s1:0,s2:0};render()">Enter Score</button>
              </div>`:
              m.status==='finished'?`<div style="padding:5px 11px;border-top:1px solid var(--border)"><span class="badge bg-g" style="font-size:9px">Completed</span></div>`:''}
            </div>
          `).join('')}
        </div>
      `).join('')}

function renderBVTeam(team,match,isT1){
  if(!team) return `<div class="bv-team bye">— TBD</div>`;
  const isWinner=match.winner&&JSON.stringify(match.winner.pair)===JSON.stringify(team.pair);
  const score=isT1?match.score1:match.score2;
  return `<div class="bv-team${isWinner?' win':''}${match.status==='bye'&&!isT1?' bye':''}">
    <span style="font-size:11px">${fmtPair(team.pair,S.tournament)}${team.from?` <span style="font-size:9px;color:var(--text3)">(${team.from})</span>`:''}${match.status==='bye'&&isT1?' <span class="badge bg-b" style="margin-left:4px;font-size:9px">BYE</span>':''}</span>
    ${score!==null&&score!==undefined?`<span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;color:${isWinner?'var(--accent2)':'var(--text)'}">${score}</span>`:''}
  </div>`;
}

function renderCrossScoreModal(){
  const cs=S.crossScoreModal;
  const t=S.tournament;
  const st=t.crossover.stages[cs.si];
  const m=st.matches[cs.mi];
  return `<div class="overlay" onclick="S.crossScoreModal=null;render()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">${st.name}</div>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:18px">
        <div class="sib">
          <div class="label">${m.t1?fmtPair(m.t1.pair,t):'TBD'}</div>
          <div class="sid">${cs.s1}</div>
          <div style="display:flex;justify-content:center;gap:7px;margin-top:10px">
            <button class="sbtn" onclick="S.crossScoreModal.s1=Math.max(0,S.crossScoreModal.s1-1);render()">−</button>
            <button class="sbtn" onclick="S.crossScoreModal.s1++;render()">+</button>
          </div>
        </div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:var(--text3)">VS</div>
        <div class="sib">
          <div class="label">${m.t2?fmtPair(m.t2.pair,t):'TBD'}</div>
          <div class="sid">${cs.s2}</div>
          <div style="display:flex;justify-content:center;gap:7px;margin-top:10px">
            <button class="sbtn" onclick="S.crossScoreModal.s2=Math.max(0,S.crossScoreModal.s2-1);render()">−</button>
            <button class="sbtn" onclick="S.crossScoreModal.s2++;render()">+</button>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-out" onclick="S.crossScoreModal=null;render()">Cancel</button>
        <button class="btn btn-g" onclick="submitCrossScore()">Save & Advance</button>
      </div>
    </div>
  </div>`;
}

async function submitCrossScore(){
  const cs=S.crossScoreModal;
  const t=S.tournament;
  const st=t.crossover.stages[cs.si];
  const m=st.matches[cs.mi];
  m.score1=cs.s1;m.score2=cs.s2;
  const winner=cs.s1>cs.s2?m.t1:m.t2;
  advanceCrossover(cs.si,cs.mi,winner);
  S.crossScoreModal=null;
  render();
  toast('Score saved! Winner advanced.','ok');
  if(S.sheetsUrl.trim()){
    syncMatchScore(
      {team1:m.t1?.pair,team2:m.t2?.pair,score1:cs.s1,score2:cs.s2,winner:winner?.pair},
      '',st.name,true
    );
    syncCrossover();
  }
}

// ═══════════════════════════════════════════════════════════
//  SCORER VIEW
// ═══════════════════════════════════════════════════════════
function renderScorer(){
  const t=S.tournament;
  if(!t) return `<div class="empty"><div class="empty-i">📋</div><div class="empty-t">No active tournament</div></div>`;
  return `<div>
    <div class="title" style="margin-bottom:4px">Score Entry</div>
    <div class="sub" style="margin-bottom:18px">${t.name} — ${t.category}</div>
    ${t.levels.map(lvl=>`<div style="margin-bottom:20px">
      <div style="font-weight:700;font-size:16px;margin-bottom:10px">${lvl.name}</div>
      ${lvl.brackets.map(br=>`<div class="card" style="margin-bottom:10px">
        <div style="font-weight:600;margin-bottom:10px">${br.label}</div>
        ${br.matches.filter(m=>m.status==='pending').length===0?
          `<div style="color:var(--text3);font-size:12px">All matches completed</div>`:
          br.matches.filter(m=>m.status==='pending').map(m=>`<div class="panel fbetween" style="margin-bottom:7px">
            <div>
              <div class="mc-team">${fmtPair(m.team1,t)}</div>
              <div class="mc-vs">VS</div>
              <div class="mc-team">${fmtPair(m.team2,t)}</div>
            </div>
            <button class="btn btn-y btn-sm" onclick="openScore('${m.id}','${br.id}','${lvl.id}')">Enter Score</button>
          </div>`).join('')}
      </div>`).join('')}
    </div>`).join('')}
    ${S.scoreModal?renderScoreModal():''}
  </div>`;
}

// ═══════════════════════════════════════════════════════════
//  PUBLIC VIEW
// ═══════════════════════════════════════════════════════════
function renderPublic(){
  const t=S.tournament;
  if(!t||!t.levels.length)
    return `<div class="empty"><div class="empty-i">🏸</div><div class="empty-t">No tournament data</div></div>`;
  refreshStandings();
  const pt=S.pubTab||'standings';
  return `<div>
    <div class="fbetween" style="margin-bottom:18px;flex-wrap:wrap;gap:10px">
      <div><div class="title">${t.name}</div><span class="badge bg-y" style="margin-top:4px">${t.category}</span></div>
      ${S.currentMatch?`<span class="badge bg-g" style="font-size:12px;padding:6px 13px">● Match In Progress</span>`:''}
    </div>
    <div class="tabs">
      ${['standings','matches','crossover'].map(tab=>`<div class="tab${pt===tab?' active':''}" onclick="S.pubTab='${tab}';render()">${tab.charAt(0).toUpperCase()+tab.slice(1)}</div>`).join('')}
    </div>
    ${pt==='standings'?renderPubStandings():''}
    ${pt==='matches'?renderPubMatches():''}
    ${pt==='crossover'?renderPubCrossover():''}
  </div>`;
}

function renderPubStandings(){
  const t=S.tournament;
  return t.levels.map(lvl=>`<div style="margin-bottom:22px">
    <div style="font-weight:700;font-size:18px;margin-bottom:10px">${lvl.name}</div>
    <div class="g3">${lvl.brackets.map(br=>`<div class="card">
      <div style="font-weight:700;margin-bottom:10px;color:var(--accent)">${br.label}${br.balanced?` <span class="badge bg-y" style="font-size:8px">⚖ Balanced</span>`:''}</div>
      ${renderStandings(br.standings,lvl)}
    </div>`).join('')}</div>
  </div>`).join('');
}

function renderPubMatches(){
  const t=S.tournament;
  return `<div>
    ${S.currentMatch?`<div style="margin-bottom:18px"><div class="label" style="color:var(--accent2);margin-bottom:7px">● On Court Now</div>${renderCourtMini(S.currentMatch)}</div>`:''}
    ${t.levels.map(lvl=>`<div style="margin-bottom:20px">
      <div style="font-weight:700;font-size:17px;margin-bottom:10px">${lvl.name}</div>
      ${lvl.brackets.map(br=>`<div class="card" style="margin-bottom:10px">
        <div style="font-weight:600;margin-bottom:8px">${br.label}</div>
        ${br.matches.map(m=>`<div style="padding:9px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px">
          <span>${fmtPair(m.team1,t)} <span style="color:var(--text3)">vs</span> ${fmtPair(m.team2,t)}</span>
          ${m.status==='finished'?`<span style="font-weight:700;font-family:'Barlow Condensed',sans-serif;font-size:16px;color:var(--accent)">${m.score1}—${m.score2}</span>`:
            S.currentMatch&&S.currentMatch.matchId===m.id?`<span class="badge bg-g">● Playing</span>`:
            `<span class="badge bg-n">Pending</span>`}
        </div>`).join('')}
      </div>`).join('')}
    </div>`).join('')}
  </div>`;
}

function renderPubCrossover(){
  if(!S.tournament?.crossover) return `<div class="empty"><div class="empty-i">🏆</div><div class="empty-t">Crossover not started</div></div>`;
  return renderBViz();
}

// ═══════════════════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════════════════
S._loginRole='admin';
S._saTab='users';
render();
</script>
