<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>ShuttlePro — Badminton Tournament Organizer</title>
<link href="https://fonts.googleapis.com/css2?family=Barlow:wght@300;400;500;600;700;900&family=Barlow+Condensed:wght@400;600;700;900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --primary:#1a1f2e;--surface:#242938;--surface2:#2d3347;--surface3:#363d56;
  --accent:#f0c040;--accent2:#3dd68c;--accent3:#5b9cf6;--danger:#f05555;--warn:#f08040;
  --text:#e8eaf0;--text2:#9ba3c2;--text3:#5f6882;
  --border:#3a4260;--border2:#4a5580;--r:12px;--rs:8px;
}
body{font-family:'Barlow',sans-serif;background:var(--primary);color:var(--text);min-height:100vh;overflow-x:hidden}
h1,h2,h3,h4{font-family:'Barlow Condensed',sans-serif;letter-spacing:.02em}
button,input,select,textarea{font-family:'Barlow',sans-serif}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:var(--surface)}
::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}

/* NAV */
#app{min-height:100vh;display:flex;flex-direction:column}
.nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 12px;display:flex;align-items:center;gap:6px;height:50px;flex-shrink:0;position:sticky;top:0;z-index:200;overflow:hidden}
.nav-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:19px;color:var(--accent);letter-spacing:.06em;white-space:nowrap;flex-shrink:0}
.nav-logo span{color:var(--text);font-weight:400}
.nav-tabs{display:flex;align-items:center;gap:4px;flex:1;overflow-x:auto;overflow-y:hidden;scrollbar-width:none;-ms-overflow-style:none;padding:0 4px}
.nav-tabs::-webkit-scrollbar{display:none}
.nav-tab{background:none;border:none;color:var(--text2);font-size:10px;font-weight:700;padding:4px 9px;border-radius:20px;transition:all .2s;text-transform:uppercase;letter-spacing:.04em;cursor:pointer;white-space:nowrap;flex-shrink:0}
.nav-tab.active{background:var(--accent);color:var(--primary)}
.nav-tab:hover:not(.active){background:var(--surface2);color:var(--text)}
.nav-right{display:flex;align-items:center;gap:6px;flex-shrink:0}
.nav-user{font-size:10px;color:var(--text3);padding:3px 8px;background:var(--surface2);border-radius:20px;white-space:nowrap;max-width:100px;overflow:hidden;text-overflow:ellipsis}
.logout-btn{background:none;border:1px solid var(--border);color:var(--text2);font-size:11px;padding:3px 8px;border-radius:20px;cursor:pointer;transition:all .2s;white-space:nowrap;flex-shrink:0}
.logout-btn:hover{border-color:var(--danger);color:var(--danger)}

/* FIREBASE STATUS */
.fb-bar{background:#0d1829;border-bottom:1px solid var(--border);padding:4px 16px;display:flex;align-items:center;gap:10px;font-size:11px;flex-wrap:wrap}
.fb-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.fb-dot.on{background:var(--accent2)}.fb-dot.off{background:var(--text3)}.fb-dot.err{background:var(--danger)}.fb-dot.sync{background:var(--accent);animation:pulse 1s infinite}
.sdot{width:8px;height:8px;border-radius:50%;flex-shrink:0;transition:background .3s}
.sdot.ok{background:var(--accent2)}.sdot.err{background:var(--danger)}
.sdot.wait{background:var(--accent);animation:pulse 1s infinite}.sdot.off{background:var(--text3)}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.sbar-btn{background:none;border:1px solid var(--border2);color:var(--text2);font-size:11px;padding:3px 10px;border-radius:6px;cursor:pointer;transition:all .2s}
.sbar-btn:hover{border-color:var(--accent);color:var(--accent)}

/* MAIN */
.main{flex:1;padding:20px;max-width:1440px;margin:0 auto;width:100%}

/* CARDS */
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:18px}
.card-sm{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:12px}
.panel{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:12px;margin-bottom:8px}

/* TYPE */
.title{font-family:'Barlow Condensed',sans-serif;font-size:24px;font-weight:700}
.sub{font-size:13px;color:var(--text2);margin-top:2px}
.label{font-size:11px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;margin-bottom:5px;display:block}

/* BADGES */
.badge{display:inline-flex;align-items:center;gap:4px;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.05em}
.bg-y{background:rgba(240,192,64,.15);color:var(--accent)}
.bg-g{background:rgba(61,214,140,.15);color:var(--accent2)}
.bg-b{background:rgba(91,156,246,.15);color:var(--accent3)}
.bg-r{background:rgba(240,85,85,.15);color:var(--danger)}
.bg-n{background:var(--surface3);color:var(--text2)}

/* BUTTONS */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:5px;padding:7px 16px;border-radius:var(--rs);font-size:12px;font-weight:700;border:none;cursor:pointer;transition:all .2s;text-transform:uppercase;letter-spacing:.05em;white-space:nowrap}
.btn:disabled{opacity:.35;cursor:not-allowed}
.btn-y{background:var(--accent);color:var(--primary)}.btn-y:hover:not(:disabled){background:#f5cc55}
.btn-g{background:var(--accent2);color:var(--primary)}.btn-g:hover:not(:disabled){background:#55e8a8}
.btn-b{background:var(--accent3);color:#fff}.btn-b:hover:not(:disabled){background:#7baef8}
.btn-r{background:var(--danger);color:#fff}.btn-r:hover:not(:disabled){background:#f56f6f}
.btn-o{background:var(--warn);color:#fff}.btn-o:hover:not(:disabled){background:#f59050}
.btn-out{background:transparent;border:1px solid var(--border2);color:var(--text2)}
.btn-out:hover:not(:disabled){border-color:var(--text2);color:var(--text)}
.btn-sm{padding:4px 11px;font-size:10px}.btn-xs{padding:3px 7px;font-size:9px}
.btn-lg{padding:13px 26px;font-size:14px}.btn-full{width:100%}

/* INPUTS */
.inp{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);border-radius:var(--rs);padding:8px 12px;font-size:13px;outline:none;transition:border .2s}
.inp:focus{border-color:var(--accent)}.inp-sm{padding:5px 9px;font-size:11px}
textarea.inp{resize:vertical;min-height:68px}
.frow{display:flex;gap:10px;margin-bottom:10px}.fcol{flex:1}
.tag{display:inline-flex;align-items:center;gap:4px;background:var(--surface3);border:1px solid var(--border);border-radius:20px;padding:3px 8px;font-size:11px;color:var(--text2)}
.tag button{background:none;border:none;color:var(--text3);font-size:13px;line-height:1;cursor:pointer;padding:0}
.tag button:hover{color:var(--danger)}.tags{display:flex;flex-wrap:wrap;gap:5px;margin-top:6px}

/* GRID */
.g2{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.g4{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
.fbetween{display:flex;align-items:center;justify-content:space-between}
.flex{display:flex;align-items:center}.gap8{gap:8px}.gap12{gap:12px}

/* STEPS */
.steps{display:flex;align-items:center;margin-bottom:20px}
.step{display:flex;align-items:center;gap:6px}
.snum{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;border:2px solid var(--border);color:var(--text3);flex-shrink:0;transition:all .3s}
.snum.done{background:var(--accent2);border-color:var(--accent2);color:var(--primary)}
.snum.cur{background:var(--accent);border-color:var(--accent);color:var(--primary)}
.slabel{font-size:11px;color:var(--text3);white-space:nowrap}.slabel.cur{color:var(--text)}
.ssep{flex:1;height:1px;background:var(--border);margin:0 6px}

/* TABS */
.tabs{display:flex;gap:3px;background:var(--surface2);border-radius:var(--rs);padding:3px;width:fit-content;margin-bottom:16px}
.tab{padding:5px 14px;border-radius:6px;font-size:11px;font-weight:700;cursor:pointer;border:none;background:none;color:var(--text2);transition:all .2s;text-transform:uppercase;letter-spacing:.05em}
.tab.active{background:var(--accent);color:var(--primary)}.tab:hover:not(.active){color:var(--text)}

/* BRACKET BUTTONS */
.brkt-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;margin-top:12px}
.brkt-btn{background:var(--surface2);border:2px solid var(--border);border-radius:var(--r);padding:20px 12px;text-align:center;cursor:pointer;transition:all .25s;position:relative;overflow:hidden}
.brkt-btn::after{content:'';position:absolute;inset:0;background:linear-gradient(135deg,rgba(240,192,64,.07),transparent);opacity:0;transition:.3s}
.brkt-btn:hover::after,.brkt-btn.sel::after{opacity:1}
.brkt-btn:hover,.brkt-btn.sel{border-color:var(--accent);transform:translateY(-1px)}
.brkt-btn.sel{background:rgba(240,192,64,.07)}
.brkt-letter{font-family:'Barlow Condensed',sans-serif;font-size:46px;font-weight:900;color:var(--accent);line-height:1}
.brkt-label{font-size:11px;font-weight:700;color:var(--text2);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}
.brkt-meta{font-size:10px;color:var(--text3);margin-top:2px}

/* MATCH CARDS */
.mc{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:11px 13px;cursor:grab;transition:all .2s;user-select:none;margin-bottom:7px}
.mc:active{cursor:grabbing;opacity:.7;transform:scale(.98)}
.mc.cur{border-color:var(--accent2);background:rgba(61,214,140,.05)}
.mc.queued{border-color:var(--accent3);background:rgba(91,156,246,.04)}
.mc.done{opacity:.5}
.mc-team{font-size:13px;font-weight:600;color:var(--text)}
.mc-vs{font-size:9px;color:var(--text3);text-align:center;margin:2px 0;text-transform:uppercase;font-weight:700;letter-spacing:.12em}
.mc-score{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:700;color:var(--accent)}

/* ═══ BADMINTON COURT LAYOUT ═══ */
.courts-section{margin-bottom:24px}
.courts-grid{display:grid;gap:16px}
.courts-grid.n1{grid-template-columns:1fr}
.courts-grid.n2{grid-template-columns:repeat(2,1fr)}
.courts-grid.n3{grid-template-columns:repeat(3,1fr)}
.courts-grid.n4{grid-template-columns:repeat(2,2fr)}
.courts-grid.n5,.courts-grid.n6{grid-template-columns:repeat(3,1fr)}

/* Full badminton court SVG-style design */
.bmt-court{position:relative;border-radius:10px;overflow:hidden;min-height:240px;background:#1a4a25;border:2px solid #2d6b35;cursor:default;transition:box-shadow .2s}
.bmt-court.active{border-color:var(--accent2);box-shadow:0 0 0 2px rgba(61,214,140,.3)}
.bmt-court.empty{border-color:var(--border);background:var(--surface2);opacity:.7}
.bmt-court-lines{position:absolute;inset:0;pointer-events:none}

/* Court name label */
.court-name-wrap{position:absolute;top:6px;left:50%;transform:translateX(-50%);z-index:10;display:flex;align-items:center;gap:4px}
.court-name-display{font-family:'Barlow Condensed',sans-serif;font-weight:700;font-size:13px;color:rgba(255,255,255,.7);text-transform:uppercase;letter-spacing:.1em;cursor:pointer;padding:2px 6px;border-radius:4px;transition:background .2s}
.court-name-display:hover{background:rgba(255,255,255,.1)}
.court-name-inp{background:rgba(0,0,0,.4);border:1px solid rgba(255,255,255,.4);color:#fff;border-radius:4px;padding:2px 8px;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;text-align:center;outline:none;width:120px}
.court-edit-icon{font-size:10px;color:rgba(255,255,255,.35);cursor:pointer}

/* Players on court */
.court-content{position:relative;z-index:5;height:100%;display:flex;flex-direction:column;justify-content:space-between;padding:32px 12px 12px}
.court-half{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px}
.court-half.top{padding-bottom:8px}
.court-half.bottom{padding-top:8px}
.court-player-name{font-family:'Barlow Condensed',sans-serif;font-size:16px;font-weight:700;color:#fff;text-align:center;text-shadow:0 1px 4px rgba(0,0,0,.6);line-height:1.1;max-width:150px;word-break:break-word}
.court-score-big{font-family:'Barlow Condensed',sans-serif;font-size:52px;font-weight:900;color:var(--accent);line-height:1;text-shadow:0 2px 12px rgba(0,0,0,.5)}
.court-net-area{height:18px;display:flex;align-items:center;justify-content:center;position:relative}
.court-net-line{position:absolute;left:5%;right:5%;height:3px;background:rgba(255,255,255,.45);border-radius:2px}
.court-net-post-l{position:absolute;left:2%;width:5px;height:14px;background:rgba(255,255,255,.5);border-radius:2px;top:-4px}
.court-net-post-r{position:absolute;right:2%;width:5px;height:14px;background:rgba(255,255,255,.5);border-radius:2px;top:-4px}

/* Court status bar */
.court-status{position:absolute;bottom:6px;left:50%;transform:translateX(-50%);font-size:9px;font-weight:700;text-transform:uppercase;letter-spacing:.08em;opacity:.7;white-space:nowrap}
.court-status.live{color:var(--accent2)}
.court-status.empty{color:var(--text3)}

/* Court actions overlay */
.court-actions{position:absolute;top:8px;right:8px;z-index:10;display:flex;gap:4px}

/* Queue panel below courts */
.queue-panel{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:16px;margin-bottom:16px}
.queue-row{display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);margin-bottom:6px;cursor:grab}
.queue-row:active{cursor:grabbing;opacity:.7}
.queue-num{font-family:'Barlow Condensed',sans-serif;font-size:20px;font-weight:900;color:var(--text3);min-width:28px;text-align:center}
.queue-match-info{flex:1;min-width:0}
.queue-match-teams{font-size:13px;font-weight:600;color:var(--text);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.queue-match-meta{font-size:10px;color:var(--text3);margin-top:1px}
.queue-assign{display:flex;align-items:center;gap:5px}

/* SCORE MODAL */
.sib{background:var(--surface2);border:2px solid var(--border);border-radius:var(--rs);padding:16px;text-align:center;position:relative}
.sib.active-side{border-color:var(--accent)}
.sid{font-family:'Barlow Condensed',sans-serif;font-size:72px;font-weight:900;color:var(--accent);line-height:1;cursor:pointer;user-select:none;transition:transform .1s}
.sid:active{transform:scale(.95)}
.sbtn{width:46px;height:46px;background:var(--surface3);border:1px solid var(--border2);border-radius:var(--rs);font-size:22px;font-weight:700;color:var(--text);cursor:pointer;transition:all .2s;display:inline-flex;align-items:center;justify-content:center}
.sbtn:hover{background:var(--accent);color:var(--primary)}

/* ═══ SCORER SCOREBOARD ═══ */
.scoreboard{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);overflow:hidden;margin-bottom:16px;transition:all .3s}
.scoreboard.fs-mode{position:fixed;inset:0;z-index:5000;border-radius:0;margin:0;display:flex;flex-direction:column}
.scoreboard-header{background:var(--surface2);padding:10px 16px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--border);flex-shrink:0}
.scoreboard-body{display:grid;grid-template-columns:1fr 72px 1fr;flex:1;min-height:260px}
.scoreboard.fs-mode .scoreboard-body{min-height:0}

/* Left side — Amber/Gold team */
.score-side{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 14px;cursor:pointer;transition:background .12s;user-select:none;position:relative}
.score-side.left{background:rgba(240,192,64,.08);border-right:1px solid rgba(240,192,64,.15)}
.score-side.left:hover{background:rgba(240,192,64,.14)}
.score-side.left:active{background:rgba(240,192,64,.2)}
.score-side.left .big-score{color:#f0c040;text-shadow:0 0 40px rgba(240,192,64,.35)}
.score-side.left .player-name{color:#f5d070}

/* Right side — Teal/Blue team */
.score-side.right{background:rgba(61,214,140,.08);border-left:1px solid rgba(61,214,140,.15)}
.score-side.right:hover{background:rgba(61,214,140,.14)}
.score-side.right:active{background:rgba(61,214,140,.2)}
.score-side.right .big-score{color:#3dd68c;text-shadow:0 0 40px rgba(61,214,140,.3)}
.score-side.right .player-name{color:#6ee8b0}

.score-side .tap-hint{font-size:10px;color:var(--text3);text-transform:uppercase;letter-spacing:.07em;margin-bottom:8px}
.score-side .player-name{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;text-align:center;margin-bottom:12px;line-height:1.1;max-width:260px;word-break:break-word}
.score-side .big-score{font-family:'Barlow Condensed',sans-serif;font-size:140px;font-weight:900;line-height:1;transition:transform .08s}
.scoreboard.fs-mode .big-score{font-size:220px}
.score-side:active .big-score{transform:scale(.94)}
.score-side .score-btns-row{display:flex;gap:8px;margin-top:16px}

/* Score +/- buttons colored per side */
.score-side.left .sbtn:hover{background:var(--accent);color:var(--primary)}
.score-side.right .sbtn:hover{background:var(--accent2);color:var(--primary)}

.score-divider{display:flex;flex-direction:column;align-items:center;justify-content:center;background:var(--surface2);border-left:1px solid var(--border);border-right:1px solid var(--border);gap:6px;flex-shrink:0}
.score-vs-text{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:900;color:var(--text3);letter-spacing:.05em}
.score-set-label{font-size:9px;color:var(--text3);text-transform:uppercase;letter-spacing:.06em}
.scoreboard-footer{border-top:1px solid var(--border);padding:11px 16px;display:flex;gap:8px;flex-wrap:wrap;justify-content:space-between;align-items:center;flex-shrink:0}
.scoreboard.fs-mode .scoreboard-footer{padding:14px 20px;background:var(--surface2)}

/* Fullscreen button */
.fs-btn{background:none;border:1px solid var(--border2);color:var(--text2);border-radius:6px;padding:4px 10px;font-size:12px;cursor:pointer;transition:all .2s}
.fs-btn:hover{border-color:var(--accent);color:var(--accent)}

/* Leading indicator */
.leading-badge{font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;padding:2px 8px;border-radius:20px;margin-top:4px}
.leading-badge.amber{background:rgba(240,192,64,.2);color:var(--accent)}
.leading-badge.teal{background:rgba(61,214,140,.2);color:var(--accent2)}
.leading-badge.tie{background:var(--surface3);color:var(--text3)}

/* STANDINGS */
.stbl{width:100%;border-collapse:collapse;font-size:12px}
.stbl th{padding:7px 10px;text-align:left;color:var(--text2);font-size:10px;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);font-weight:700}
.stbl td{padding:8px 10px;border-bottom:1px solid rgba(58,66,96,.4)}
.stbl tr:hover td{background:rgba(255,255,255,.02)}

/* CROSSOVER */
.bv-stage{display:flex;flex-direction:column;gap:14px;min-width:190px}
.bv-title{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.08em;text-align:center;margin-bottom:7px}
.bv-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);overflow:hidden;min-width:175px}
.bv-team{padding:7px 11px;font-size:12px;font-weight:600;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center}
.bv-team.win{color:var(--accent2);background:rgba(61,214,140,.06)}
.bv-team.bye{color:var(--text3);font-style:italic}

/* HOME STATS */
.home-stat{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rs);padding:14px;text-align:center}
.home-stat-n{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:900;color:var(--accent);line-height:1}
.home-stat-l{font-size:10px;color:var(--text2);margin-top:3px;text-transform:uppercase;letter-spacing:.05em}

/* END BANNER */
.end-banner{background:linear-gradient(135deg,rgba(240,192,64,.12),rgba(61,214,140,.08));border:1px solid var(--accent);border-radius:var(--r);padding:18px 22px}

/* HISTORY TABLE */
.htbl{width:100%;border-collapse:collapse;font-size:12px}
.htbl th{padding:8px 12px;text-align:left;font-size:10px;color:var(--text2);text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid var(--border);font-weight:700}
.htbl td{padding:10px 12px;border-bottom:1px solid rgba(58,66,96,.35);font-size:12px}
.htbl tr:hover td{background:rgba(255,255,255,.02)}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;z-index:1000;backdrop-filter:blur(4px)}
.modal{background:var(--surface);border:1px solid var(--border2);border-radius:var(--r);padding:24px;width:100%;max-width:480px;max-height:92vh;overflow-y:auto}
.modal-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:700;margin-bottom:16px}

/* LOGIN */

.login-wrap::before{content:'';position:absolute;width:700px;height:700px;background:radial-gradient(circle,rgba(240,192,64,.07) 0%,transparent 70%);top:-200px;right:-200px;pointer-events:none}

.login-box{background:var(--surface);border:1px solid var(--border);border-radius:20px;padding:40px 34px;width:100%;max-width:400px;position:relative;z-index:1}
.login-logo{font-family:'Barlow Condensed',sans-serif;font-weight:900;font-size:28px;color:var(--accent);text-align:center;letter-spacing:.06em}

.roles{display:grid;grid-template-columns:repeat(2,1fr);gap:7px;margin-bottom:20px}
.role-btn{background:var(--surface2);border:2px solid transparent;border-radius:var(--rs);padding:10px 7px;text-align:center;cursor:pointer;transition:all .2s}
.role-btn.sel{border-color:var(--accent);background:rgba(240,192,64,.1)}
.role-icon{font-size:18px;margin-bottom:2px}.role-name{font-size:10px;font-weight:700;color:var(--text2);text-transform:uppercase;letter-spacing:.05em}

.pw-wrap{position:relative}

.pw-toggle:hover{color:var(--text)}

/* TOAST */
.toast-wrap{position:fixed;bottom:18px;right:18px;z-index:3000;display:flex;flex-direction:column;gap:6px}
.toast{background:var(--surface2);border:1px solid var(--border2);border-radius:var(--rs);padding:9px 14px;font-size:12px;display:flex;align-items:center;gap:7px;animation:tIn .3s ease;max-width:280px}

.toast.inf{border-color:var(--accent3);color:var(--accent3)}.toast.sy{border-color:var(--accent);color:var(--accent)}

.empty-i{font-size:42px;margin-bottom:9px;opacity:.35}.empty-t{font-size:15px;color:var(--text2)}

}

</head>
<body>
<div id="app"></div>
<div class="toast-wrap" id="toasts"></div>
<script>
// ═══════════════════════════════════════════════════════════
//  CONFIG — edit these values, then redeploy to Vercel
//  Every device that opens the URL will auto-connect.
// ═══════════════════════════════════════════════════════════

// ── GOOGLE SHEETS (Apps Script) — for Excel recording ────
const APPS_SCRIPT_URL='https://script.google.com/macros/s/AKfycbwwSWC8wopu6zQvUTI2JkJLx4CaWVOlLjgmOQeF6nFfZb9fN0WC8hPt61XVZg_2OxoQSA/exec';

// ── FIREBASE — paste your project values here ─────────────
// Find them: Firebase Console → Project Settings → Your Apps → SDK setup (Config)
// After pasting, redeploy the HTML to Vercel — ALL devices will auto-connect.
const FB_CONFIG = {
  apiKey:            "YOUR_API_KEY",
  authDomain:        "YOUR_PROJECT_ID.firebaseapp.com",
  projectId:         "YOUR_PROJECT_ID",
  storageBucket:     "YOUR_PROJECT_ID.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId:             "YOUR_APP_ID"
};

// ── Firebase init ─────────────────────────────────────────
let DB = null;
let FB_STATUS = 'off';
let FB_MSG = '';
let _unsubscribes = [];

function fbConfigured(){
  // Check if the hardcoded config has real values
  if(FB_CONFIG.apiKey && FB_CONFIG.apiKey !== 'YOUR_API_KEY') return true;
  // Check if Super Admin saved config to localStorage on this browser
  const saved = _fbLoadSavedConfig();
  if(saved){ Object.assign(FB_CONFIG, saved); return true; }
  return false;
}

function _fbSaveConfig(cfg){
  try{ localStorage.setItem('sp_fb_cfg', JSON.stringify(cfg)); }catch(e){}
}
function _fbLoadSavedConfig(){
  try{
    const s = localStorage.getItem('sp_fb_cfg');
    if(s){ const p=JSON.parse(s); if(p.apiKey&&p.projectId) return p; }
  }catch(e){}
  return null;
}

function fbInit(){
  try {
    if(!fbConfigured()){
      FB_STATUS='off'; FB_MSG='Not configured'; fbBarUpdate(); return;
    }
    // Reset if previously initialised with different config
    if(firebase.apps.length){
      firebase.app().delete().then(()=>{ _doFbInit(); }).catch(()=>{ _doFbInit(); });
    } else {
      _doFbInit();
    }
  } catch(e){
    FB_STATUS='err'; FB_MSG=e.message; fbBarUpdate();
  }
}

function _doFbInit(){
  try{
    firebase.initializeApp(FB_CONFIG);
    DB = firebase.firestore();
    // Enable persistence so the app works briefly offline
    DB.enablePersistence({synchronizeTabs:true}).catch(()=>{});
    FB_STATUS='connecting'; FB_MSG='Connecting…'; fbBarUpdate();
    DB.collection('_ping').doc('test').set({t:Date.now()})
      .then(()=>{ FB_STATUS='on'; FB_MSG='Connected'; fbBarUpdate(); })
      .catch(e=>{ FB_STATUS='err'; FB_MSG=e.message; fbBarUpdate(); });
  }catch(e){
    FB_STATUS='err'; FB_MSG=e.message; fbBarUpdate();
  }
}

function fbBarUpdate(){
  const bar=document.getElementById('fb-bar');
  if(!bar)return;
  const cls={off:'off',connecting:'sync',on:'on',err:'err'};
  const lbl={
    off:'Firebase: Not configured — all devices need the config embedded in the HTML',
    connecting:'Firebase: Connecting…',
    on:'Firebase: Live — all devices synced automatically',
    err:'Firebase: Error — '+FB_MSG
  };
  bar.querySelector('.fb-dot').className='fb-dot '+(cls[FB_STATUS]||'off');
  bar.querySelector('.fb-label').textContent=lbl[FB_STATUS]||'';
}

// ═══════════════════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════════════════
const S={
  user:null,role:null,
  sheetsUrl:APPS_SCRIPT_URL,sheetsStatus:'off',sheetsMsg:'',
  adminTab:'home',matchTab:'rr',pubTab:'standings',
  tournament:null,
  courts:[],            // [{id,name,matchId,bracketId,levelId,liveScore:{s1,s2}}]
  numCourts:0,          // set during tournament creation
  courtsSetup:false,
  matchQueue:[],        // [{matchId,bracketId,levelId,courtId?}]
  selectedLvl:null,selectedBr:null,
  scoreModal:null,crossScoreModal:null,
  scorerCourtId:null,   // which court scorer is entering for
  scorerFullscreen:false,
  userModal:null,endModal:false,
  dragSrc:null,
  history:[],historyLoaded:false,
  editingCourtId:null,
  activeTournamentId:null,
  _activeTournamentList:[],
  _showTournamentPicker:false,
  _loginRole:'admin',_loginErr:'',_tCat:null,_tName:'',_numCourts:2,_saTab:'users',
  users:[
    {id:1,username:'admin',password:'admin123',role:'admin',name:'Tournament Admin'},
    {id:2,username:'scorer',password:'scorer123',role:'scorer',name:'Court Scorer'},
    {id:3,username:'superadmin',password:'super123',role:'superadmin',name:'Super Admin'},
  ],
};

// ═══════════════════════════════════════════════════════════
//  SHEETS
// ═══════════════════════════════════════════════════════════
// ═══════════════════════════════════════════════════════════
//  SHEETS — Apps Script integration
//  Uses GET with encoded payload — avoids CORS preflight issues
// ═══════════════════════════════════════════════════════════
async function sheetsPost(action,data){
  const url=S.sheetsUrl.trim();
  if(!url){S.sheetsStatus='off';return{ok:false,error:'No URL'};}
  S.sheetsStatus='syncing';updateSheetsDot();
  const body=JSON.stringify({action,data});

  // Use GET for small payloads (< 2000 chars, avoids CORS preflight)
  // Use no-cors POST for large payloads (tournament setup with many players)
  if(body.length<1800){
    try{
      const payload=encodeURIComponent(body);
      const res=await fetch(`${url}?payload=${payload}`,{method:'GET',redirect:'follow'});
      const text=await res.text();
      const clean=text.replace(/^\)\]\}'\n?/,'').trim();
      let json;
      try{json=JSON.parse(clean);}
      catch{json={ok:true,note:'non-JSON response'};}
      S.sheetsStatus=json.ok?'ok':'err';
      S.sheetsMsg=json.ok?'Synced '+new Date().toLocaleTimeString():(json.error||'Error');
      updateSheetsDot();return json;
    }catch(e){
      // Fall through to POST
    }
  }

  // POST (no-cors) for large payloads — write-only, no response read
  try{
    await fetch(url,{method:'POST',mode:'no-cors',body});
    S.sheetsStatus='ok';
    S.sheetsMsg='Sent '+new Date().toLocaleTimeString();
    updateSheetsDot();
    return{ok:true,note:'Sent via POST'};
  }catch(e){
    S.sheetsStatus='err';S.sheetsMsg=e.message;
    updateSheetsDot();return{ok:false,error:e.message};
  }
}
function updateSheetsDot(){
  const d=document.querySelector('.sbar .sdot');
  if(!d)return;
  const c={off:'off',ok:'ok',err:'err',syncing:'wait'};
  d.className='sdot '+(c[S.sheetsStatus]||'off');
}
async function syncSetup(){if(!S.tournament)return;const t=S.tournament;await sheetsPost('saveTournamentSetup',{tournamentId:t.id,tournamentName:t.name,category:t.category,createdAt:t.created,levels:t.levels.map(l=>({name:l.name,brackets:l.brackets.map(b=>({label:b.label,pairs:b.pairs}))}))});}
async function syncMatchScore(match,levelName,bracketLabel,isXover){if(!S.tournament||!S.sheetsUrl.trim())return;const t=S.tournament;const winner=match.score1>match.score2?match.team1||match.t1:match.team2||match.t2;await sheetsPost('saveMatchScore',{tournamentName:t.name,levelName:levelName||'',bracketLabel:bracketLabel||'',round:match.round||'',team1:match.team1||match.t1,team2:match.team2||match.t2,score1:match.score1,score2:match.score2,winner,stage:isXover?bracketLabel:'Round Robin',timestamp:new Date().toISOString()});}
async function syncStandings(){if(!S.tournament)return;refreshStandings();const t=S.tournament;await sheetsPost('saveFinalStandings',{tournamentName:t.name,levels:t.levels.map(l=>({name:l.name,brackets:l.brackets.map(b=>({label:b.label,standings:b.standings.map(s=>({pair:s.pair,W:s.W,L:s.L,PF:s.PF,PA:s.PA,pts:s.pts}))}))}))}); }
async function syncCrossover(){if(!S.tournament||!S.tournament.crossover)return;const t=S.tournament;await sheetsPost('saveCrossoverResult',{tournamentName:t.name,stages:t.crossover.stages.map(st=>({name:st.name,matches:st.matches.map(m=>({t1:m.t1,t2:m.t2,score1:m.score1,score2:m.score2,winner:m.winner,status:m.status}))}))});}
async function syncEndTournament(){const t=S.tournament;if(!t)return;let champion='',runnerUp='';if(t.crossover){const f=t.crossover.stages.find(s=>s.name==='Final');if(f&&f.matches[0]){const fm=f.matches[0];if(fm.winner)champion=fmtPair(fm.winner.pair);const loser=fm.winner&&fm.t1&&fm.t2?(JSON.stringify(fm.winner.pair)===JSON.stringify(fm.t1.pair)?fm.t2:fm.t1):null;if(loser)runnerUp=fmtPair(loser.pair);}}const totalPlayers=t.levels.reduce((a,l)=>a+l.players.length+(l.highPlayers||[]).length+(l.midPlayers||[]).length,0);const totalMatches=t.levels.reduce((a,l)=>a+l.brackets.reduce((b,br)=>b+br.matches.length,0),0);const res=await sheetsPost('endTournament',{tournamentName:t.name,category:t.category,totalPlayers,champion,runnerUp,totalMatches,createdAt:t.created,endedAt:new Date().toISOString()});if(res.ok){S.history.unshift({id:S.history.length+1,name:t.name,category:t.category,totalPlayers,champion,runnerUp,totalMatches,createdAt:t.created,endedAt:new Date().toISOString()});toast('Saved to Sheets history!','ok');}}
async function loadHistory(){if(!S.sheetsUrl.trim()){S.historyLoaded=true;return;}const res=await sheetsPost('getHistory',{});if(res.ok&&res.history){S.history=res.history.reverse();S.historyLoaded=true;}}

// ═══════════════════════════════════════════════════════════
//  FIREBASE SYNC — real-time cross-device state
// ═══════════════════════════════════════════════════════════

// ── Tournament ID used as Firestore document path ─────────
function getTid(){ return S.tournament?.id||null; }

// ── WRITE helpers ─────────────────────────────────────────

// Push entire tournament state to Firestore (called after setup, bracket gen)
async function fbPushTournament(){
  if(!DB||!S.tournament)return;
  const t=S.tournament;
  try {
    await DB.collection('tournaments').doc(t.id).set({
      id:t.id, name:t.name, category:t.category, created:t.created,
      numCourts:S.numCourts,
      courts:JSON.stringify(S.courts),
      levels: JSON.stringify(t.levels),
      crossover: t.crossover?JSON.stringify(t.crossover):null,
      ended: t.ended||false,
      createdBy: t.createdBy||'',
      updatedAt: Date.now()
    });
  } catch(e){ console.warn('fbPushTournament:',e.message); }
}

// Push courts state (live scores + assignments) — called after every score update
async function fbPushCourts(){
  if(!DB||!getTid())return;
  try {
    await DB.collection('tournaments').doc(getTid()).collection('live').doc('courts').set({
      courts: JSON.stringify(S.courts),
      queue:  JSON.stringify(S.matchQueue),
      updatedAt: Date.now()
    });
  } catch(e){ console.warn('fbPushCourts:',e.message); }
}

// Push a single finished match score (lightweight, for real-time score updates)
async function fbPushMatchScore(matchId,brId,s1,s2,status){
  if(!DB||!getTid())return;
  try {
    await DB.collection('tournaments').doc(getTid())
      .collection('matches').doc(matchId).set({matchId,brId,s1,s2,status,updatedAt:Date.now()});
  } catch(e){ console.warn('fbPushMatchScore:',e.message); }
}

// Push crossover state
async function fbPushCrossover(){
  if(!DB||!getTid()||!S.tournament?.crossover)return;
  try {
    await DB.collection('tournaments').doc(getTid()).collection('live').doc('crossover').set({
      crossover: JSON.stringify(S.tournament.crossover),
      updatedAt: Date.now()
    });
  } catch(e){ console.warn('fbPushCrossover:',e.message); }
}

// ── SUBSCRIBE helpers ─────────────────────────────────────

// Subscribe to courts/queue live doc — all roles see live court state
function fbSubscribeCourts(tid){
  if(!DB)return;
  const unsub = DB.collection('tournaments').doc(tid)
    .collection('live').doc('courts')
    .onSnapshot(snap=>{
      if(!snap.exists)return;
      const d=snap.data();
      try {
        const remoteCourts=JSON.parse(d.courts||'[]');
        const queue=JSON.parse(d.queue||'[]');
        if(remoteCourts.length){
          // For admin: merge only liveScore + matchId (preserve local name edits)
          // For scorer/public: replace entirely
          if(S.role==='admin'||S.role==='superadmin'){
            remoteCourts.forEach(rc=>{
              const lc=S.courts.find(c=>c.id===rc.id);
              if(lc){lc.matchId=rc.matchId;lc.bracketId=rc.bracketId;lc.levelId=rc.levelId;lc.liveScore={...rc.liveScore};}
              else S.courts.push({...rc}); // new court added by admin on another device
            });
          } else {
            // Scorer/public: fully replace
            S.courts=remoteCourts.map(c=>({...c,liveScore:c.liveScore||{s1:0,s2:0}}));
          }
        }
        S.matchQueue=queue;
        render();
      } catch(e){ console.warn('fbSubscribeCourts parse:',e.message); }
    }, e=>{ FB_STATUS='err';FB_MSG=e.message;fbBarUpdate(); });
  _unsubscribes.push(unsub);
}

// Subscribe to tournament doc — all roles update
function fbSubscribeTournament(tid){
  if(!DB)return;
  const unsub = DB.collection('tournaments').doc(tid)
    .onSnapshot(snap=>{
      if(!snap.exists)return;
      const d=snap.data();
      try{
        const updated={
          id:d.id||tid, name:d.name, category:d.category, created:d.created,
          levels:JSON.parse(d.levels||'[]'),
          crossover:d.crossover?JSON.parse(d.crossover):null,
          ended:d.ended||false
        };
        // Admin: only update levels/crossover (don't overwrite local courts/queue)
        if(S.role==='admin'||S.role==='superadmin'){
          if(S.tournament){
            S.tournament.levels=updated.levels;
            S.tournament.crossover=updated.crossover;
            S.tournament.ended=updated.ended;
          }
        } else {
          // Scorer/public: full replace
          S.tournament=updated;
          S.numCourts=d.numCourts||S.courts.length;
          if(S.courts.length===0&&d.numCourts){
            S.courts=[];
            for(let i=0;i<d.numCourts;i++)
              S.courts.push({id:'c'+(i+1),name:'Court '+(i+1),matchId:null,bracketId:null,levelId:null,liveScore:{s1:0,s2:0}});
          }
          S.courtsSetup=true;
        }
        render();
      }catch(e){ console.warn('fbSubscribeTournament parse:',e.message); }
    }, e=>{ console.warn('fbSubscribeTournament err:',e.message); });
  _unsubscribes.push(unsub);
}

// Subscribe to crossover live doc
function fbSubscribeCrossover(tid){
  if(!DB)return;
  const unsub = DB.collection('tournaments').doc(tid)
    .collection('live').doc('crossover')
    .onSnapshot(snap=>{
      if(!snap.exists||!S.tournament)return;
      const d=snap.data();
      if(S.role==='public'||S.role==='scorer'){
        try{S.tournament.crossover=JSON.parse(d.crossover||'null');render();}
        catch(e){}
      }
    });
  _unsubscribes.push(unsub);
}

function stopSubscriptions(){
  _unsubscribes.forEach(u=>{try{u();}catch(e){}});
  _unsubscribes=[];
}

// Load ALL active (non-ended) tournaments — NO compound index needed
async function fbLoadAllActiveTournaments(){
  if(!DB)return [];
  try {
    // Use only a simple where clause — no orderBy to avoid needing a composite index
    const snap=await DB.collection('tournaments')
      .where('ended','==',false)
      .limit(10).get();
    if(snap.empty){
      // Fallback: index might not exist yet — try fetching all recent docs
      const all=await DB.collection('tournaments')
        .orderBy('updatedAt','desc').limit(10).get();
      const active=all.docs.filter(d=>!d.data().ended);
      if(!active.length) return [];
      return active.map(d=>({
        id:d.id, name:d.data().name||'Unnamed',
        category:d.data().category||'',
        numCourts:d.data().numCourts||1,
        created:d.data().created||'',
        updatedAt:d.data().updatedAt||0
      }));
    }
    // Sort client-side by updatedAt descending
    const results = snap.docs.map(d=>({
      id:d.id, name:d.data().name||'Unnamed',
      category:d.data().category||'',
      numCourts:d.data().numCourts||1,
      created:d.data().created||'',
      updatedAt:d.data().updatedAt||0,
      createdBy:d.data().createdBy||''
    }));
    results.sort((a,b)=>b.updatedAt-a.updatedAt);
    return results;
  } catch(e){
    console.warn('fbLoadAllActive error:',e.message);
    // Final fallback: try without any filter
    try {
      const all=await DB.collection('tournaments')
        .orderBy('updatedAt','desc').limit(20).get();
      return all.docs
        .filter(d=>!d.data().ended)
        .map(d=>({
          id:d.id, name:d.data().name||'Unnamed',
          category:d.data().category||'',
          numCourts:d.data().numCourts||1,
          created:d.data().created||'',
          updatedAt:d.data().updatedAt||0
        }));
    } catch(e2){ console.warn('fbLoadAllActive fallback failed:',e2.message); return []; }
  }
}

// Load a specific tournament by ID and start subscriptions
async function fbLoadTournamentById(tid){
  if(!DB)return false;
  try {
    const doc=await DB.collection('tournaments').doc(tid).get();
    if(!doc.exists)return false;
    const d=doc.data();
    S.tournament={
      id:d.id||tid, name:d.name, category:d.category, created:d.created,
      levels:JSON.parse(d.levels||'[]'),
      crossover:d.crossover?JSON.parse(d.crossover):null,
      ended:d.ended||false,
      createdBy:d.createdBy||''
    };
    S.numCourts=d.numCourts||1;
    // Build courts with stable IDs matching what admin originally created
    const savedCourts = d.courts ? JSON.parse(d.courts) : null;
    if(savedCourts&&savedCourts.length){
      // Use the same court objects admin created (preserves IDs and names)
      S.courts=savedCourts.map(c=>({...c, liveScore:c.liveScore||{s1:0,s2:0}}));
    } else {
      S.courts=[];
      for(let i=0;i<S.numCourts;i++)
        S.courts.push({id:'c'+(i+1),name:'Court '+(i+1),matchId:null,bracketId:null,levelId:null,liveScore:{s1:0,s2:0}});
    }
    S.courtsSetup=true;
    stopSubscriptions();
    fbSubscribeTournament(tid);
    fbSubscribeCourts(tid);
    fbSubscribeCrossover(tid);
    S.activeTournamentId=tid;
    return true;
  } catch(e){ console.warn('fbLoadTournamentById:',e.message); return false; }

function toast(msg,type='inf'){const tc=document.getElementById('toasts');const t=document.createElement('div');t.className=`toast ${type}`;const icons={ok:'✓',er:'✕',inf:'ℹ',sy:'⟳'};t.innerHTML=`<span>${icons[type]||'ℹ'}</span><span>${msg}</span>`;tc.appendChild(t);setTimeout(()=>t.remove(),3500);}
function shuffle(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[b[i],b[j]]=[b[j],b[i]];}return b;}
function gid(){return Math.random().toString(36).slice(2,9)}
function fmtPair(pair,t){if(!pair)return'TBD';if(typeof pair==='string')return pair;if(!t||t.category==='Doubles')return pair.filter(Boolean).join(' / ')||'TBD';return pair[0]||'TBD';}
function getBrMatch(brId,mId){for(const l of S.tournament.levels)for(const b of l.brackets)if(b.id===brId)return b.matches.find(m=>m.id===mId);}
function getLvlAndBr(brId){for(const l of S.tournament.levels)for(const b of l.brackets)if(b.id===brId)return{lvl:l,br:b};return{};}

// ═══════════════════════════════════════════════════════════
//  ROUND ROBIN
// ═══════════════════════════════════════════════════════════
function genRR(pairs){const n=pairs.length;if(n<2)return[];const list=n%2===0?[...pairs]:[...pairs,'BYE'];const len=list.length;const matches=[];for(let r=0;r<len-1;r++){for(let i=0;i<len/2;i++){const a=list[i],b=list[len-1-i];if(a!=='BYE'&&b!=='BYE')matches.push({id:gid(),team1:a,team2:b,score1:null,score2:null,status:'pending',round:r+1});}list.splice(1,0,list.pop());}return matches;}

// ═══════════════════════════════════════════════════════════
//  STANDINGS
// ═══════════════════════════════════════════════════════════
function computeStandings(pairs,matches){const map={};pairs.forEach(p=>{const k=JSON.stringify(p);map[k]={pair:p,key:k,W:0,L:0,PF:0,PA:0,pts:0};});matches.filter(m=>m.status==='finished').forEach(m=>{const k1=JSON.stringify(m.team1),k2=JSON.stringify(m.team2);if(!map[k1]||!map[k2])return;const s1=m.score1||0,s2=m.score2||0;map[k1].PF+=s1;map[k1].PA+=s2;map[k2].PF+=s2;map[k2].PA+=s1;if(s1>s2){map[k1].W++;map[k1].pts+=2;map[k2].L++;}else if(s2>s1){map[k2].W++;map[k2].pts+=2;map[k1].L++;}else{map[k1].pts++;map[k2].pts++;}});return Object.values(map).sort((a,b)=>{if(b.pts!==a.pts)return b.pts-a.pts;const h=h2h(a.pair,b.pair,matches);if(h)return h;return(b.PF-b.PA)-(a.PF-a.PA);});}
function h2h(pA,pB,matches){const m=matches.find(m=>{const sa=JSON.stringify(pA),sb=JSON.stringify(pB);return(JSON.stringify(m.team1)===sa&&JSON.stringify(m.team2)===sb)||(JSON.stringify(m.team1)===sb&&JSON.stringify(m.team2)===sa);});if(!m||m.status!=='finished')return 0;const myFirst=JSON.stringify(m.team1)===JSON.stringify(pA);const s1=m.score1||0,s2=m.score2||0;if(myFirst)return s1>s2?-1:s2>s1?1:0;return s2>s1?-1:s1>s2?1:0;}
function refreshStandings(){if(!S.tournament)return;S.tournament.levels.forEach(l=>l.brackets.forEach(b=>{b.standings=computeStandings(b.pairs,b.matches);}));}

function initCourts(n){
  S.courts=[];
  for(let i=0;i<n;i++){
    S.courts.push({id:gid(),name:'Court '+(i+1),matchId:null,bracketId:null,levelId:null,liveScore:{s1:0,s2:0}});
  }
  S.numCourts=n;S.courtsSetup=true;
}

function getCourtMatch(court){if(!court.matchId)return null;return getBrMatch(court.bracketId,court.matchId);}

function assignToCourt(courtId,matchId,bracketId,levelId){
  const court=S.courts.find(c=>c.id===courtId);
  if(!court)return;
  if(court.matchId){toast('Court already has a match — end it first','er');return;}
  court.matchId=matchId;court.bracketId=bracketId;court.levelId=levelId;
  court.liveScore={s1:0,s2:0};
  S.matchQueue=S.matchQueue.filter(q=>q.matchId!==matchId);
  toast(`Match assigned to ${court.name}`,'ok');
  render();
  fbPushCourts(); // sync to Firebase
}

function endCourtMatch(courtId){
  const court=S.courts.find(c=>c.id===courtId);
  if(!court||!court.matchId)return;
  S.scoreModal={courtId,mId:court.matchId,brId:court.bracketId,lvlId:court.levelId,s1:court.liveScore.s1,s2:court.liveScore.s2};
  render();
}

function assignNextFromQueue(courtId){
  const next=S.matchQueue[0];
  if(!next){toast('Queue is empty','er');return;}
  const court=S.courts.find(c=>c.id===courtId);
  if(court&&court.matchId){toast('Court is busy','er');return;}
  assignToCourt(courtId,next.matchId,next.bracketId,next.levelId);
}

function updateLiveScore(courtId,side,delta){
  const c=S.courts.find(x=>x.id===courtId);if(!c)return;
  if(side===1)c.liveScore.s1=Math.max(0,c.liveScore.s1+delta);
  else c.liveScore.s2=Math.max(0,c.liveScore.s2+delta);
  render();
  fbPushCourts(); // sync live score to all devices
}

function swapCourtSides(courtId){
  const c=S.courts.find(x=>x.id===courtId);if(!c||!c.matchId)return;
  [c.liveScore.s1,c.liveScore.s2]=[c.liveScore.s2,c.liveScore.s1];
  const m=getBrMatch(c.bracketId,c.matchId);
  if(m)[m.team1,m.team2]=[m.team2,m.team1];
  toast('Sides swapped — players and scores exchanged','ok');render();
  fbPushCourts();
  fbPushTournament(); // team order changed
}

// ═══════════════════════════════════════════════════════════
//  CROSSOVER
// ═══════════════════════════════════════════════════════════
function initCrossover(){
  refreshStandings();const t=S.tournament;
  const rank1=[];t.levels.forEach(l=>l.brackets.forEach(b=>{if(b.standings[0])rank1.push({pair:b.standings[0].pair,from:b.label,levelId:l.id,bracketId:b.id});}));
  if(rank1.length<2){toast('Need at least 2 brackets','er');return;}
  t.crossover={stages:buildStages(shuffle(rank1))};render();toast('Crossover bracket created!','ok');
  fbPushTournament();fbPushCrossover();
}
function buildStages(teams){const n=teams.length;if(n===2)return[{name:'Final',matches:[{id:gid(),t1:teams[0],t2:teams[1],score1:null,score2:null,status:'pending',winner:null}]}];if(n===3){const bi=Math.floor(Math.random()*3);const bye=teams[bi];const oth=teams.filter((_,i)=>i!==bi);return[{name:'Semi-Final',matches:[{id:gid(),t1:oth[0],t2:oth[1],score1:null,score2:null,status:'pending',winner:null},{id:gid(),t1:bye,t2:null,score1:null,score2:null,status:'bye',winner:bye,isBye:true}]},{name:'Final',matches:[{id:gid(),t1:null,t2:null,score1:null,score2:null,status:'pending',winner:null}]}];}if(n===4)return[{name:'Semi-Final',matches:[{id:gid(),t1:teams[0],t2:teams[3],score1:null,score2:null,status:'pending',winner:null},{id:gid(),t1:teams[1],t2:teams[2],score1:null,score2:null,status:'pending',winner:null}]},{name:'Final',matches:[{id:gid(),t1:null,t2:null,score1:null,score2:null,status:'pending',winner:null}]}];const half=Math.ceil(n/2);const semis=[];for(let i=0;i<half;i++){const opp=teams[n-1-i]||null;semis.push({id:gid(),t1:teams[i],t2:opp,score1:null,score2:null,status:opp?'pending':'bye',winner:opp?null:teams[i],isBye:!opp});}const stages=[{name:'Quarter-Final',matches:semis}];const sfCount=Math.ceil(half/2);const sfM=[];for(let i=0;i<sfCount;i++)sfM.push({id:gid(),t1:null,t2:null,score1:null,score2:null,status:'pending',winner:null});stages.push({name:'Semi-Final',matches:sfM});stages.push({name:'Final',matches:[{id:gid(),t1:null,t2:null,score1:null,score2:null,status:'pending',winner:null}]});return stages;}
function advanceCrossover(si,mi,winner){const stages=S.tournament.crossover.stages;const m=stages[si].matches[mi];m.winner=winner;m.status='finished';const ns=stages[si+1];if(ns){const nm=ns.matches.find(x=>!x.t1||!x.t2);if(nm){if(!nm.t1)nm.t1=winner;else if(!nm.t2)nm.t2=winner;}}}
function allBrDone(){if(!S.tournament)return false;return S.tournament.levels.every(l=>l.brackets.length&&l.brackets.every(b=>b.matches.every(m=>m.status==='finished')));}

async function doEndTournament(skipSave=false){
  const t=S.tournament;
  let champion='',runnerUp='';
  if(t.crossover){
    const f=t.crossover.stages.find(s=>s.name==='Final');
    if(f&&f.matches[0]&&f.matches[0].winner){
      champion=fmtPair(f.matches[0].winner.pair,t);
      const fm=f.matches[0];
      const loser=fm.t1&&fm.t2?(JSON.stringify(fm.winner.pair)===JSON.stringify(fm.t1.pair)?fm.t2:fm.t1):null;
      if(loser) runnerUp=fmtPair(loser.pair,t);
    }
  }
  const totalMatches=t.levels.reduce((a,l)=>a+l.brackets.reduce((b,br)=>b+br.matches.length,0),0);
  if(!skipSave){await syncStandings();await syncCrossover();await syncEndTournament();}
  if(DB&&t){
    try{
      await DB.collection('tournaments').doc(t.id).update({
        ended:true,endedAt:new Date().toISOString(),updatedAt:Date.now(),
        champion,runnerUp,totalMatches
      });
    }catch(e){console.warn('fbEndTournament:',e.message);}
  }
  stopSubscriptions();
  S.endModal=false;S.tournament.ended=true;S.tournament=null;
  S.courts=[];S.numCourts=0;S.courtsSetup=false;S.matchQueue=[];
  render();toast(skipSave?'Tournament force-ended.':'Tournament ended and saved!','ok');
}

function saveFbConfig(){
  const apiKey    = document.getElementById('fb-apiKey')?.value.trim();
  const projectId = document.getElementById('fb-projectId')?.value.trim();
  const appId     = document.getElementById('fb-appId')?.value.trim();
  const senderId  = document.getElementById('fb-senderId')?.value.trim();
  if(!apiKey||!projectId){ toast('API Key and Project ID are required','er'); return; }

  // Apply to runtime config
  FB_CONFIG.apiKey            = apiKey;
  FB_CONFIG.projectId         = projectId;
  FB_CONFIG.authDomain        = projectId+'.firebaseapp.com';
  FB_CONFIG.storageBucket     = projectId+'.appspot.com';
  FB_CONFIG.appId             = appId    || FB_CONFIG.appId;
  FB_CONFIG.messagingSenderId = senderId || FB_CONFIG.messagingSenderId;

  // Save to localStorage so this browser remembers it
  _fbSaveConfig({...FB_CONFIG});

  toast('Config saved — connecting…','inf');

  // Re-init
  DB=null; FB_STATUS='connecting';
  if(firebase.apps.length){
    firebase.app().delete()
      .then(()=>{ _doFbInit(); render(); })
      .catch(()=>{ _doFbInit(); render(); });
  } else {
    _doFbInit(); render();
  }

  // Show the redeploy instructions as a prominent message
  S._fbShowRedeployMsg = true;
  setTimeout(render, 1200);
}

async function deleteHistoryEntry(docId){
  if(!confirm('Delete this tournament from history? This cannot be undone.')) return;
  if(DB){

      await DB.collection('tournaments').doc(String(docId)).delete();
      toast('Deleted from history','ok');
    }catch(e){
      // If docId is a number index from old local history, just remove locally
      console.warn('FB delete failed:',e.message);
    }
  }
  // Remove from local state too
  S.history=S.history.filter(h=>String(h.id)!==String(docId));
  render();

async function deleteAllHistory(){
  if(!confirm('Delete ALL tournament history? This permanently removes all ended tournaments from Firebase.')) return;
  if(DB){
    try{
      // Get all ended tournaments and delete them in batch
      const snap=await DB.collection('tournaments').where('ended','==',true).get();
      const batch=DB.batch();

function submitAllPlayers(){
  saveDrafts();
  let totalAdded=0;
  S.tournament.levels.forEach(l=>{
    if(l.pairingMode==='balanced'){
      const hLines=getDraft(`${l.id}_high`).split('\n').map(s=>s.trim()).filter(Boolean);
      const mLines=getDraft(`${l.id}_mid`).split('\n').map(s=>s.trim()).filter(Boolean);
      if(hLines.length){l.highPlayers=[...(l.highPlayers||[]),...hLines];clearDraft(`${l.id}_high`);totalAdded+=hLines.length;}
      if(mLines.length){l.midPlayers=[...(l.midPlayers||[]),...mLines];clearDraft(`${l.id}_mid`);totalAdded+=mLines.length;}
    } else {
      const lines=getDraft(`${l.id}_std`).split('\n').map(s=>s.trim()).filter(Boolean);
      if(lines.length){l.players=[...l.players,...lines];clearDraft(`${l.id}_std`);totalAdded+=lines.length;}
    }
    if(totalAdded>0) l.brackets=[];
  });
  if(totalAdded===0){toast('No pending players to add','er');return;}
  render();
  toast(`✓ Added ${totalAdded} player${totalAdded!==1?'s':''} across all levels!`,'ok');
}

// ── BRACKET GENERATION ───────────────────────────────────
function genBracketsBtn(lvlId){
  const lvl=S.tournament.levels.find(l=>l.id===lvlId);
  if(!lvl){toast('Level not found','er');return;}
  const isBalanced=lvl.pairingMode==='balanced';
  const cat=S.tournament.category;
  const n=parseInt(document.getElementById(`nbr-${lvlId}`)?.value)||1;

  // Count total players
  const totalPl=isBalanced
    ?(lvl.highPlayers||[]).length+(lvl.midPlayers||[]).length
    :lvl.players.length;
  if(totalPl<2){toast('Need at least 2 players','er');return;}

  let pairs=[];

  if(cat==='Singles'){
    // Singles: every player is their own pair regardless of tier
    const allPl=isBalanced
      ?[...(lvl.highPlayers||[]),...(lvl.midPlayers||[])]
      :lvl.players;
    pairs=shuffle(allPl).map(p=>[p]);

  } else if(isBalanced){
    // Doubles balanced: pair each High with a Mid
    const high=shuffle([...(lvl.highPlayers||[])]);
    const mid=shuffle([...(lvl.midPlayers||[])]);
    const balanced=[];
    const minLen=Math.min(high.length,mid.length);
    for(let i=0;i<minLen;i++) balanced.push([high[i],mid[i]]);
    // Leftover players — pair among themselves randomly
    const leftover=[...high.slice(minLen),...mid.slice(minLen)];
    for(let i=0;i<leftover.length-1;i+=2) balanced.push([leftover[i],leftover[i+1]]);
    if(leftover.length%2!==0) balanced.push([leftover[leftover.length-1],'TBD']);
    pairs=balanced;

  } else {
    // Doubles standard: random pairing
    const sh=shuffle(lvl.players);
    for(let i=0;i<sh.length-1;i+=2) pairs.push([sh[i],sh[i+1]]);
    if(sh.length%2) pairs.push([sh[sh.length-1],'TBD']);
  }

  const perB=Math.ceil(pairs.length/n);
  lvl.brackets=[];
  for(let b=0;b<n;b++){
    const bp=pairs.slice(b*perB,(b+1)*perB);
    const matches=genRR(bp);
    lvl.brackets.push({
      id:gid(),
      label:'Bracket '+String.fromCharCode(65+b),
      pairs:bp,matches,
      standings:computeStandings(bp,matches),
      balanced:isBalanced,
    });
  }
  render();
  toast('Brackets generated!','ok');
  if(S.sheetsUrl.trim()) setTimeout(syncSetup,400);
  setTimeout(fbPushTournament,500); // push updated levels/brackets to Firebase
}

function returnMatchToQueue(courtId){
  const c=S.courts.find(x=>x.id===courtId);
  if(!c||!c.matchId)return;
  const hasScore=c.liveScore.s1>0||c.liveScore.s2>0;
  if(hasScore){
    if(!confirm(`This match already has a live score (${c.liveScore.s1}–${c.liveScore.s2}). Return to queue anyway and discard the score?`))return;
  }
  S.matchQueue.unshift({matchId:c.matchId,bracketId:c.bracketId,levelId:c.levelId});
  c.matchId=null;c.bracketId=null;c.levelId=null;c.liveScore={s1:0,s2:0};
  toast('Match returned to queue','ok');render();
  fbPushCourts(); // sync freed court to all devices
}

function dropQueue(targetId){
  if(!S.dragSrc||!S.dragSrc.startsWith('q:'))return;
  const srcId=S.dragSrc.slice(2);if(srcId===targetId)return;
  const ia=S.matchQueue.findIndex(q=>q.matchId===srcId);
  const ib=S.matchQueue.findIndex(q=>q.matchId===targetId);
  if(ia>-1&&ib>-1)[S.matchQueue[ia],S.matchQueue[ib]]=[S.matchQueue[ib],S.matchQueue[ia]];
  S.dragSrc=null;render();
}

function doDrop(targetId,brId){
  if(!S.dragSrc)return;let src;try{src=JSON.parse(S.dragSrc);}catch{S.dragSrc=null;return;}
  if(src.mId===targetId||src.brId!==brId){S.dragSrc=null;return;}
  for(const l of S.tournament.levels)for(const b of l.brackets)if(b.id===brId){
    const ia=b.matches.findIndex(m=>m.id===src.mId);const ib=b.matches.findIndex(m=>m.id===targetId);
    if(ia>-1&&ib>-1)[b.matches[ia],b.matches[ib]]=[b.matches[ib],b.matches[ia]];
  }
  S.dragSrc=null;render();toast('Order updated');
}
function queueM(mId,brId,lvlId){if(S.matchQueue.find(q=>q.matchId===mId)){toast('Already queued');return;}S.matchQueue.push({matchId:mId,bracketId:brId,levelId:lvlId});toast('Added to queue','ok');render();}

async function submitScore(){
  const sm=S.scoreModal;
  const brId=sm.brId||sm.bracketId;const mId=sm.mId||sm.matchId;
  const m=getBrMatch(brId,mId);const{lvl,br}=getLvlAndBr(brId);if(!m)return;
  m.score1=sm.s1;m.score2=sm.s2;m.status='finished';refreshStandings();
  if(sm.courtId){const c=S.courts.find(x=>x.id===sm.courtId);if(c){c.matchId=null;c.bracketId=null;c.levelId=null;c.liveScore={s1:0,s2:0};}}
  const freed=S.courts.find(c=>!c.matchId&&sm.courtId===c.id);
  if(freed&&S.matchQueue.length){const next=S.matchQueue[0];S.matchQueue.shift();assignToCourtDirect(freed.id,next.matchId,next.bracketId,next.levelId);}
  S.scoreModal=null;render();toast('Score saved!','ok');
  // Excel record
  if(S.sheetsUrl.trim()) syncMatchScore(m,lvl?.name,br?.label,false);
  // Firebase sync
  fbPushMatchScore(mId,brId,sm.s1,sm.s2,'finished');
  fbPushCourts();
  fbPushTournament();
}
function assignToCourtDirect(cid,mId,brId,lvlId){
  const c=S.courts.find(x=>x.id===cid);if(!c)return;
  c.matchId=mId;c.bracketId=brId;c.levelId=lvlId;c.liveScore={s1:0,s2:0};
  fbPushCourts();
}
function openScore(mId,brId,lvlId){S.scoreModal={mId,brId,lvlId,s1:0,s2:0};render();}

// ═══════════════════════════════════════════════════════════
//  STANDINGS
// ═══════════════════════════════════════════════════════════
function renderStandings(standings){
  if(!standings||!standings.length)return`<div class="empty" style="padding:12px;font-size:12px">No matches played</div>`;
  return`<table class="stbl">
    <thead><tr><th>#</th><th>Pair</th><th>W</th><th>L</th><th>Pts</th></tr></thead>
    <tbody>${standings.map((s,i)=>`<tr>
      <td style="color:${i===0?'var(--accent)':i===1?'var(--text)':'var(--text3)'};font-weight:700">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</td>
      <td style="font-weight:${i<2?700:400};font-size:11px">${fmtPair(s.pair,S.tournament)}</td>
      <td style="color:var(--accent2)">${s.W}</td><td style="color:var(--danger)">${s.L}</td>
      <td style="font-weight:700">${s.pts}</td>
    </tr>`).join('')}</tbody>
  </table>`;
}

// ═══════════════════════════════════════════════════════════
//  CROSSOVER
// ═══════════════════════════════════════════════════════════
function renderXO(){
  const t=S.tournament;
  if(!t||!t.crossover){
    if(!allBrDone())return`<div class="empty"><div class="empty-i">🏆</div><div class="empty-t">Complete round robin first</div></div>`;
    return`<div class="card" style="text-align:center;padding:38px">
      <div style="font-size:36px;margin-bottom:9px">🏆</div>
      <div style="font-size:20px;font-weight:700;margin-bottom:5px">Ready for Crossover!</div>
      <div class="sub" style="margin-bottom:16px">All round robin complete.</div>
      <button class="btn btn-y btn-lg" onclick="initCrossover()">Generate Crossover Bracket</button>
    </div>`;
  }
  return`<div>
    <div class="fbetween" style="margin-bottom:16px">
      <div class="title">Crossover Bracket</div>
      <button class="btn btn-out btn-sm" onclick="initCrossover()">↻ Regenerate</button>
    </div>
    ${renderBViz()}
  </div>`;
}
function renderBViz(){
  const t=S.tournament;if(!t||!t.crossover)return'';
  return`<div style="overflow-x:auto"><div style="display:flex;gap:26px;min-width:max-content;padding:5px">
    ${t.crossover.stages.map((st,si)=>`<div class="bv-stage">
      <div class="bv-title">${st.name}</div>
      ${st.matches.map((m,mi)=>`<div class="bv-box">
        ${renderBVTeam(m.t1,m,true)}${renderBVTeam(m.t2,m,false)}
        ${m.status==='pending'&&m.t1&&m.t2?`<div style="padding:6px;border-top:1px solid var(--border)">
          <button class="btn btn-y btn-xs btn-full" onclick="S.crossScoreModal={si:${si},mi:${mi},s1:0,s2:0};render()">Score</button>
        </div>`:m.status==='finished'?`<div style="padding:5px 10px;border-top:1px solid var(--border)"><span class="badge bg-g" style="font-size:8px">Done</span></div>`:''}
      </div>`).join('')}
    </div>`).join('')}
  </div></div>`;
}
function renderBVTeam(team,match,isT1){
  if(!team)return`<div class="bv-team bye">— TBD</div>`;
  const isW=match.winner&&JSON.stringify(match.winner.pair)===JSON.stringify(team.pair);
  const score=isT1?match.score1:match.score2;
  return`<div class="bv-team${isW?' win':''}${match.status==='bye'&&!isT1?' bye':''}">
    <span style="font-size:11px">${fmtPair(team.pair,S.tournament)}${team.from?` <span style="font-size:9px;color:var(--text3)">(${team.from})</span>`:''}${match.status==='bye'&&isT1?' <span class="badge bg-b" style="margin-left:3px;font-size:8px">BYE</span>':''}</span>
    ${score!==null&&score!==undefined?`<span style="font-family:'Barlow Condensed',sans-serif;font-weight:700;color:${isW?'var(--accent2)':'var(--text)'}">${score}</span>`:''}
  </div>`;
}
function renderCrossScoreModal(){
  const cs=S.crossScoreModal;const t=S.tournament;
  const st=t.crossover.stages[cs.si];const m=st.matches[cs.mi];
  return`<div class="overlay" onclick="S.crossScoreModal=null;render()">
    <div class="modal" onclick="event.stopPropagation()">
      <div class="modal-title">${st.name}</div>
      <div style="display:grid;grid-template-columns:1fr auto 1fr;gap:10px;align-items:center;margin-bottom:16px">
        <div class="sib"><div class="label">${m.t1?fmtPair(m.t1.pair,t):'TBD'}</div>
          <div class="sid" onclick="S.crossScoreModal.s1++;render()">${cs.s1}</div>
          <div style="display:flex;justify-content:center;gap:7px;margin-top:10px">
            <button class="sbtn" onclick="S.crossScoreModal.s1=Math.max(0,S.crossScoreModal.s1-1);render()">−</button>
            <button class="sbtn" onclick="S.crossScoreModal.s1++;render()">+</button>
          </div>
        </div>
        <div style="font-family:'Barlow Condensed',sans-serif;font-size:26px;font-weight:700;color:var(--text3)">VS</div>
        <div class="sib"><div class="label">${m.t2?fmtPair(m.t2.pair,t):'TBD'}</div>
          <div class="sid" onclick="S.crossScoreModal.s2++;render()">${cs.s2}</div>
          <div style="display:flex;justify-content:center;gap:7px;margin-top:10px">
            <button class="sbtn" onclick="S.crossScoreModal.s2=Math.max(0,S.crossScoreModal.s2-1);render()">−</button>
            <button class="sbtn" onclick="S.crossScoreModal.s2++;render()">+</button>
          </div>
        </div>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end">
        <button class="btn btn-out" onclick="S.crossScoreModal=null;render()">Cancel</button>
        <button class="btn btn-g" onclick="submitCrossScore()">Save & Advance</button>
      </div>
    </div>
  </div>`;
}
async function submitCrossScore(){
  const cs=S.crossScoreModal;const t=S.tournament;
  const st=t.crossover.stages[cs.si];const m=st.matches[cs.mi];
  m.score1=cs.s1;m.score2=cs.s2;const winner=cs.s1>cs.s2?m.t1:m.t2;
  advanceCrossover(cs.si,cs.mi,winner);S.crossScoreModal=null;render();toast('Winner advanced!','ok');
  // Excel record
  if(S.sheetsUrl.trim()){syncMatchScore({team1:m.t1?.pair,team2:m.t2?.pair,score1:cs.s1,score2:cs.s2,winner:winner?.pair},'',st.name,true);syncCrossover();}
  // Firebase sync
  fbPushCrossover();fbPushTournament();
}

// ═══════════════════════════════════════════════════════════
//  SCORER VIEW — full scoreboard
// ═══════════════════════════════════════════════════════════
function renderScorer(){
  const t=S.tournament;
  if(!t)return`<div class="empty"><div class="empty-i">📋</div><div class="empty-t">No active tournament</div></div>`;
  // If a court is selected for scoring, show the scoreboard
  const selCourt=S.scorerCourtId?S.courts.find(c=>c.id===S.scorerCourtId):null;
  if(selCourt&&selCourt.matchId){
    return renderScorerBoard(selCourt);
  }
  // Reset fullscreen state when on picker
  S.scorerFullscreen=false;
  return`<div>
    <div class="title" style="margin-bottom:4px">Scorer — Select Court</div>
    <div class="sub" style="margin-bottom:18px">${t.name} · ${t.category}</div>
    <div class="courts-grid ${`n${Math.min(S.courts.length,3)}`}" style="margin-bottom:20px">
      ${S.courts.map(c=>{
        const m=getCourtMatch(c);
        return`<div class="bmt-court${m?' active':' empty'}" style="cursor:${m?'pointer':'default'}" onclick="${m?`S.scorerCourtId='${c.id}';render()`:''}">
          <svg class="court-lines" style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 300 240" preserveAspectRatio="none">
            <rect x="10" y="10" width="280" height="220" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="1.5"/>
            <line x1="10" y1="110" x2="290" y2="110" stroke="rgba(255,255,255,.18)" stroke-width="1.2"/>
            <line x1="28" y1="10" x2="28" y2="230" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
            <line x1="272" y1="10" x2="272" y2="230" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
            <rect x="8" y="106" width="284" height="8" fill="rgba(255,255,255,.25)" rx="2"/>
          </svg>
          <div class="court-name-wrap"><span class="court-name-display" style="cursor:default">${c.name}</span></div>
          <div class="court-content">
            <div class="court-half top">${m?`<div class="court-player-name">${fmtPair(m.team1,t)}</div><div class="court-score-big">${c.liveScore.s1}</div>`:`<div style="color:rgba(255,255,255,.2);font-size:12px">EMPTY</div>`}</div>
            <div class="court-net-area"><div class="court-net-post-l"></div><div class="court-net-line"></div><div class="court-net-post-r"></div></div>
            <div class="court-half bottom">${m?`<div class="court-score-big">${c.liveScore.s2}</div><div class="court-player-name">${fmtPair(m.team2,t)}</div>`:`<div style="color:rgba(255,255,255,.12);font-size:11px">No match</div>`}</div>
          </div>
          <div class="court-status ${m?'live':'empty'}">${m?'● TAP TO SCORE':'Waiting'}</div>
        </div>`;
      }).join('')}
    </div>
    ${S.scoreModal?renderScoreModal():''}
  </div>`;
}

function toggleScorerFS(){
  S.scorerFullscreen=!S.scorerFullscreen;
  // Try native fullscreen API if available
  if(S.scorerFullscreen){
    document.documentElement.requestFullscreen?.().catch(()=>{});
  } else {
    document.exitFullscreen?.().catch(()=>{});
  }
  render();
}

function renderScorerBoard(court){
  const m=getCourtMatch(court);const t=S.tournament;
  if(!m)return`<div class="empty"><div class="empty-t">No match on this court</div>
    <button class="btn btn-out btn-sm" style="margin-top:12px" onclick="S.scorerCourtId=null;render()">← Back</button></div>`;

  const fs=S.scorerFullscreen;
  const s1=court.liveScore.s1, s2=court.liveScore.s2;
  const leading=s1>s2?'left':s2>s1?'right':'tie';
  const leadLabel=leading==='left'?'Leading':leading==='right'?'Leading':'Tied';
  const name1=fmtPair(m.team1,t);
  const name2=fmtPair(m.team2,t);

  return`<div>
    ${!fs?`<div class="fbetween" style="margin-bottom:14px">
      <button class="btn btn-out btn-sm" onclick="S.scorerCourtId=null;S.scorerFullscreen=false;render()">← All Courts</button>
      <div style="font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:700;color:var(--accent)">${court.name}</div>
    </div>`:''}

    <div class="scoreboard${fs?' fs-mode':''}">
      <!-- HEADER -->
      <div class="scoreboard-header">
        <div style="display:flex;align-items:center;gap:10px">
          ${fs?`<button class="btn btn-out btn-xs" onclick="S.scorerCourtId=null;S.scorerFullscreen=false;render()">← Back</button>`:''}
          <span style="font-size:13px;font-weight:700;color:var(--accent)">${court.name}</span>
          <span class="badge bg-g">● Live</span>
        </div>
        <div style="display:flex;gap:7px;align-items:center">
          <span style="font-size:11px;color:var(--text3)">${name1} vs ${name2}</span>
          <button class="fs-btn" onclick="toggleScorerFS()" title="${fs?'Exit fullscreen':'Enter fullscreen'}">
            ${fs?'⊠ Exit Full':'⛶ Full Screen'}
          </button>
        </div>
      </div>

      <!-- BODY: two colored halves + VS divider -->
      <div class="scoreboard-body">

        <!-- ── LEFT (amber/gold) ── -->
        <div class="score-side left" onclick="updateLiveScore('${court.id}',1,1)">
          <div class="tap-hint">▲ Tap anywhere to +1</div>
          <div class="player-name">${name1}</div>
          <div class="big-score">${s1}</div>
          ${leading==='left'?`<div class="leading-badge amber">▲ Leading</div>`:
            leading==='tie'?`<div class="leading-badge tie">— Tied</div>`:''}
          <div class="score-btns-row">
            <button class="sbtn" style="border-color:rgba(240,192,64,.4)" onclick="event.stopPropagation();updateLiveScore('${court.id}',1,-1)">−</button>
            <button class="sbtn" style="border-color:rgba(240,192,64,.4)" onclick="event.stopPropagation();updateLiveScore('${court.id}',1,1)">+</button>
          </div>
        </div>

        <!-- ── VS DIVIDER ── -->
        <div class="score-divider">
          <div class="score-vs-text">VS</div>
          <div class="score-set-label">${s1} — ${s2}</div>
        </div>

        <!-- ── RIGHT (teal/green) ── -->
        <div class="score-side right" onclick="updateLiveScore('${court.id}',2,1)">
          <div class="tap-hint">▲ Tap anywhere to +1</div>
          <div class="player-name">${name2}</div>
          <div class="big-score">${s2}</div>
          ${leading==='right'?`<div class="leading-badge teal">▲ Leading</div>`:
            leading==='tie'?`<div class="leading-badge tie">— Tied</div>`:''}
          <div class="score-btns-row">
            <button class="sbtn" style="border-color:rgba(61,214,140,.4)" onclick="event.stopPropagation();updateLiveScore('${court.id}',2,-1)">−</button>
            <button class="sbtn" style="border-color:rgba(61,214,140,.4)" onclick="event.stopPropagation();updateLiveScore('${court.id}',2,1)">+</button>
          </div>
        </div>
      </div>

      <!-- FOOTER -->
      <div class="scoreboard-footer">
        <div style="font-size:11px;color:var(--text3)">
          <span style="color:var(--accent)">■</span> ${name1} &nbsp;|&nbsp;
          <span style="color:var(--accent2)">■</span> ${name2}
          &nbsp;·&nbsp; Tap side or use +/− buttons
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          <button class="btn btn-out btn-sm" onclick="returnMatchToQueue('${court.id}')">↩ Return to Queue</button>
          <button class="btn btn-o btn-sm" onclick="swapCourtSides('${court.id}')">↔ Change Court</button>
          <button class="btn btn-r btn-sm" onclick="endCourtMatch('${court.id}')">🏁 End Match</button>
        </div>
      </div>
    </div>
    ${S.scoreModal?renderScoreModal():''}
  </div>`;
}

// ═══════════════════════════════════════════════════════════
//  PUBLIC VIEW
// ═══════════════════════════════════════════════════════════
function renderPublic(){
  const t=S.tournament;
  if(!t||!t.levels.length)return`<div class="empty"><div class="empty-i">🏸</div><div class="empty-t">No tournament data</div></div>`;
  refreshStandings();const pt=S.pubTab||'standings';
  return`<div>
    <div class="fbetween" style="margin-bottom:16px;flex-wrap:wrap;gap:10px">
      <div><div class="title">${t.name}</div><span class="badge bg-y" style="margin-top:4px">${t.category}</span></div>
      ${S.courts.some(c=>c.matchId)?`<span class="badge bg-g" style="font-size:11px;padding:5px 12px">● ${S.courts.filter(c=>c.matchId).length} Match${S.courts.filter(c=>c.matchId).length!==1?'es':''} Live</span>`:''}
    </div>
    <div class="tabs">
      ${['courts','standings','matches','crossover'].map(tab=>`<div class="tab${pt===tab?' active':''}" onclick="S.pubTab='${tab}';render()">${tab.charAt(0).toUpperCase()+tab.slice(1)}</div>`).join('')}
    </div>
    ${pt==='courts'?renderPubCourts():''}
    ${pt==='standings'?renderPubStandings():''}
    ${pt==='matches'?renderPubMatches():''}
    ${pt==='crossover'?renderPubCrossover():''}
  </div>`;
}
function renderPubCourts(){
  const t=S.tournament;
  return`<div>
    <div class="${`courts-grid n${Math.min(S.courts.length,3)}`}">
      ${S.courts.map(c=>{const m=getCourtMatch(c);return`<div class="bmt-court${m?' active':' empty'}">
        <svg style="position:absolute;inset:0;width:100%;height:100%;pointer-events:none" viewBox="0 0 300 240" preserveAspectRatio="none">
          <rect x="10" y="10" width="280" height="220" fill="none" stroke="rgba(255,255,255,.18)" stroke-width="1.5"/>
          <line x1="10" y1="110" x2="290" y2="110" stroke="rgba(255,255,255,.18)" stroke-width="1.2"/>
          <line x1="28" y1="10" x2="28" y2="230" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
          <line x1="272" y1="10" x2="272" y2="230" stroke="rgba(255,255,255,.1)" stroke-width="1"/>
          <rect x="8" y="106" width="284" height="8" fill="rgba(255,255,255,.25)" rx="2"/>
        </svg>
        <div class="court-name-wrap"><span class="court-name-display" style="cursor:default">${c.name}</span></div>
        <div class="court-content">
          <div class="court-half top">${m?`<div class="court-player-name">${fmtPair(m.team1,t)}</div><div class="court-score-big">${c.liveScore.s1}</div>`:`<div style="color:rgba(255,255,255,.2);font-size:12px">EMPTY</div>`}</div>
          <div class="court-net-area"><div class="court-net-post-l"></div><div class="court-net-line"></div><div class="court-net-post-r"></div></div>
          <div class="court-half bottom">${m?`<div class="court-score-big">${c.liveScore.s2}</div><div class="court-player-name">${fmtPair(m.team2,t)}</div>`:`<div style="color:rgba(255,255,255,.12);font-size:11px">Waiting</div>`}</div>
        </div>
        <div class="court-status ${m?'live':'empty'}">${m?'● LIVE':'—'}</div>
      </div>`;}).join('')}
    </div>
  </div>`;
}
function renderPubStandings(){
  const t=S.tournament;
  return t.levels.map(lvl=>`<div style="margin-bottom:20px">
    <div style="font-weight:700;font-size:18px;margin-bottom:9px">${lvl.name}</div>
    <div class="g3">${lvl.brackets.map(br=>`<div class="card"><div style="font-weight:700;margin-bottom:9px;color:var(--accent)">${br.label}</div>${renderStandings(br.standings)}</div>`).join('')}</div>
  </div>`).join('');
}
function renderPubMatches(){
  const t=S.tournament;
  return`<div>${t.levels.map(lvl=>`<div style="margin-bottom:18px">
    <div style="font-weight:700;font-size:17px;margin-bottom:9px">${lvl.name}</div>
    ${lvl.brackets.map(br=>`<div class="card" style="margin-bottom:9px">
      <div style="font-weight:600;margin-bottom:7px">${br.label}</div>
      ${br.matches.map(m=>`<div style="padding:8px 0;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;font-size:12px">
        <span>${fmtPair(m.team1,t)} <span style="color:var(--text3)">vs</span> ${fmtPair(m.team2,t)}</span>
        ${m.status==='finished'?`<span style="font-weight:700;font-family:'Barlow Condensed',sans-serif;font-size:16px;color:var(--accent)">${m.score1}—${m.score2}</span>`:
          S.courts.some(c=>c.matchId===m.id)?`<span class="badge bg-g">● Live</span>`:`<span class="badge bg-n">Pending</span>`}
      </div>`).join('')}
    </div>`).join('')}
  </div>`).join('')}</div>`;
}
function renderPubCrossover(){
  if(!S.tournament?.crossover)return`<div class="empty"><div class="empty-i">🏆</div><div class="empty-t">Crossover not started</div></div>`;
  return renderBViz();
}
